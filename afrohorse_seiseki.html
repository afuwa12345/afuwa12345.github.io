<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AFRO HORSE｜成績</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
:root{--red:#1a6fe8;--red-glow:rgba(26,111,232,0.4);--bg:#0e0b0b;--surface:#1c1010;--surface2:#231414;--text:#f0e8e8;--muted:#7a5a5a;--border:rgba(26,111,232,0.25);--green:#2ecc71}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Kosugi Maru',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.6}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(14,11,11,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px}.logo span{color:var(--red)}
.nav-home{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-decoration:none}

/* ── HERO ── */
.hero{position:relative;padding:40px 20px 28px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:340px;height:340px;background:radial-gradient(circle,var(--red-glow) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--red);margin-bottom:10px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,14vw,64px);line-height:0.9;letter-spacing:4px}
.hero-title .line2{color:var(--red)}
.divider{display:flex;align-items:center;gap:12px;margin:16px auto;max-width:200px;color:var(--red);font-size:10px;letter-spacing:3px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--red);opacity:0.5}

/* ── 年タブ ── */
.year-tabs{display:flex;gap:8px;padding:0 14px 16px;overflow-x:auto;scrollbar-width:none;position:relative;z-index:1}
.year-tabs::-webkit-scrollbar{display:none}
.year-tab{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;padding:6px 18px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.year-tab.active{background:var(--red);color:#fff;border-color:var(--red)}

/* ── サマリー ── */
.summary{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px 20px;max-width:680px;margin:0 auto}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 8px;text-align:center}
.summary-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1}
.summary-val.red{color:var(--red)}
.summary-val.green{color:var(--green)}
.summary-label{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:4px}

/* ── MAIN ── */
main{position:relative;z-index:1;padding:0 14px 60px;max-width:680px;margin:0 auto}
.last-updated{text-align:right;font-size:10px;color:var(--muted);margin-bottom:16px;letter-spacing:1px}

/* ── RACE GROUP ── */
.race-group{margin-bottom:24px;animation:fadeUp 0.4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.race-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.race-date{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:2px}
.race-venue{font-size:10px;font-weight:700;color:#fff;background:var(--red);padding:3px 8px;border-radius:2px}
.race-r{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--red);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:2px}
.race-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;line-height:1}
.race-line{flex:1;min-width:20px;height:1px;background:var(--border)}

/* ── BET CARD ── */
.bet-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;position:relative;overflow:hidden;transition:border-color 0.2s}
.bet-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.bet-card.atari{border-color:rgba(26,111,232,0.4)}
.bet-card.hazure{opacity:0.6}
.bet-top{display:grid;grid-template-columns:40px 1fr auto;align-items:start;gap:10px}
.horse-num{width:40px;height:40px;border-radius:50%;background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 10px var(--red-glow)}
.horse-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kaime-wrap{text-align:right;flex-shrink:0}
.kaime-row{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.kaime-row+.kaime-row{margin-top:4px;border-top:1px solid var(--border);padding-top:4px}
.shiki-badge{font-size:10px;font-weight:700;letter-spacing:1px;background:rgba(26,111,232,0.15);border:1px solid rgba(26,111,232,0.4);color:var(--red);padding:2px 7px;border-radius:2px}
.kaime{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:#fff;line-height:1;word-break:break-all;max-width:160px;text-align:right}

/* ── 点数・回収 ── */


/* ── ハンコ ── */
.stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-15deg);width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Kosugi Maru',sans-serif;font-size:16px;font-weight:900;letter-spacing:2px;border:4px solid;pointer-events:none;z-index:10;text-align:center;line-height:1.2;animation:stampIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both}
.stamp.atari{color:rgba(26,111,232,0.85);border-color:rgba(26,111,232,0.85)}
.stamp.hazure{color:rgba(120,120,120,0.75);border-color:rgba(120,120,120,0.75)}
@keyframes stampIn{0%{transform:translate(-50%,-50%) rotate(-15deg) scale(1.4);opacity:0}60%{opacity:1}100%{transform:translate(-50%,-50%) rotate(-15deg) scale(1);opacity:1}}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .big{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--border)}

footer{text-align:center;padding:30px 20px;font-size:10px;color:var(--muted);letter-spacing:2px;border-top:1px solid var(--border)}
footer span{color:var(--red)}

@media(max-width:600px){
  .summary{grid-template-columns:repeat(2,1fr)}
  .summary-val{font-size:22px}
  .horse-name{font-size:13px}
  .kaime{font-size:18px}
}
</style>
</head>
<body>
<header>
  <div class="logo">AFRO<span>HORSE</span></div>
  <a class="nav-home" href="https://afuwa12345.github.io/AFRO-Horse/">← HOME</a>
</header>

<div class="hero">
  <div class="hero-label">RESULTS</div>
  <h1 class="hero-title"><div>AFRO</div><div class="line2">HORSE</div></h1>
  <div class="divider">EST. 2025</div>
  <div style="font-size:11px;letter-spacing:4px;color:var(--muted)">競馬予想 × アフロスタイル</div>
  <div style="margin-top:12px;font-size:13px;color:#fff;letter-spacing:1px;line-height:1.8">毎週更新<br>目指せプラス収支</div>
  <div style="margin-top:14px;display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 20px">
    <div style="font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:4px">年間回収率</div>
    <div id="annualRate" style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--red)">--</div>
  </div>
</div>

<!-- 年タブ -->
<div class="year-tabs" id="yearTabs"></div>

<!-- サマリー -->
<div class="summary" id="summary"></div>

<main>
  <div class="last-updated" id="lastUpdated"></div>
  <div id="content"></div>
</main>

<footer>
  <div><span>AFRO</span>HORSE &nbsp;|&nbsp; 競馬予想 × アフロスタイル</div>
  <div style="margin-top:6px">EST. 2025</div>
</footer>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz2TGIwC1BB322-DkZTX98dL8e8igKQTAopgl2eHY3xsTStt3aEgZ2OBc8WDJ1LGdyVHA/exec';

const YEARS = ['2026','2027','2028','2029'];
let allData = {};
let currentYear = '2026';

async function loadData() {
  try {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">読み込み中...</div>';
    const res = await fetch(GAS_URL);
    allData = await res.json();
    buildTabs();
    renderYear(currentYear);
    document.getElementById('lastUpdated').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
  } catch(e) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">データの読み込みに失敗しました</div>';
  }
}

function buildTabs() {
  const tabs = document.getElementById('yearTabs');
  tabs.innerHTML = '';
  YEARS.forEach(y => {
    const rows = (allData[y] || []).filter(r => r['本命馬名']);
    if (!rows.length) return; // データなし年は非表示
    const btn = document.createElement('button');
    btn.className = 'year-tab' + (y === currentYear ? ' active' : '');
    btn.textContent = y;
    btn.onclick = () => {
      currentYear = y;
      document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderYear(y);
    };
    tabs.appendChild(btn);
  });
  // 最初のタブを自動選択
  const firstTab = tabs.querySelector('.year-tab');
  if (firstTab) {
    currentYear = firstTab.textContent;
    firstTab.classList.add('active');
  }
}

function renderYear(year) {
  const rows = (allData[year] || []).filter(r => r['本命馬名']);
  renderSummary(rows);
  renderPredictions(rows);
  // 年間回収率（各行の年間回収率は全行共通なので最初の値を使う）
  const rateRow = (allData[year] || []).find(r => r['年間回収率'] !== '' && r['年間回収率'] !== null);
  const annualRate = rateRow ? (Number(rateRow['年間回収率'])*100).toFixed(1)+'%' : '--';
  const el = document.getElementById('annualRate');
  if(el) {
    el.textContent = annualRate;
    el.style.color = annualRate !== '--' && parseFloat(annualRate) >= 100 ? 'var(--green)' : 'var(--red)';
  }
}

function renderSummary(rows) {
  const total = rows.length;
  const atari = rows.filter(r => r['結果'] === '〇').length;
  const rate = total ? Math.round(atari/total*100) : 0;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="summary-val">${total}</div><div class="summary-label">総予想数</div></div>
    <div class="summary-card"><div class="summary-val red">${atari}</div><div class="summary-label">的中</div></div>
    <div class="summary-card"><div class="summary-val">${rate}%</div><div class="summary-label">的中率</div></div>
  `;
}

function formatDate(v) {
  if (!v) return '';
  const d = new Date(v);
  if (isNaN(d)) return String(v);
  return (d.getMonth()+1) + '/' + d.getDate() + '(' + ['日','月','火','水','木','金','土'][d.getDay()] + ')';
}

function renderPredictions(rows) {
  const content = document.getElementById('content');
  if (!rows.length) {
    content.innerHTML = '<div class="empty-state"><div class="big">NO DATA</div><div>データがありません</div></div>';
    return;
  }
  const groups = {}, order = [];
  rows.forEach(row => {
    const key = (row['日付']||'') + '_' + (row['競馬場']||'') + '_' + (row['R']||'');
    if (!groups[key]) { groups[key] = []; order.push(key); }
    groups[key].push(row);
  });
  let html = '';
  order.reverse();
  order.forEach((key, gi) => {
    const bets = groups[key];
    const r0 = bets[0];
    const dateStr = formatDate(r0['日付']);
    const venue = r0['競馬場']||'';
    const rNum = r0['R'] ? r0['R']+'R' : '';
    const raceName = r0['レース名']||'';
    html += `<div class="race-group" style="animation-delay:${gi*0.06}s">`;
    html += '<div class="race-header">';
    if(dateStr) html += `<div class="race-date">${dateStr}</div>`;
    if(venue)   html += `<div class="race-venue">${venue}</div>`;
    if(rNum)    html += `<div class="race-r">${rNum}</div>`;
    if(raceName)html += `<div class="race-name">${raceName}</div>`;
    html += '<div class="race-line"></div></div>';

    bets.forEach(row => {
      const uma    = row['本命馬名']||'---';
      const num    = row['馬番']||'?';
      const shiki  = row['式別']||'';
      const kaime  = row['買い目']||'-';
      const shiki2 = row['式別2']||'';
      const kaime2 = row['買い目2']||'';
      const result  = row['結果']||'';
      const chakujun = row['着順'] ? Number(row['着順'])+'着' : '';
      const rate     = row['回収率'] ? (Number(row['回収率'])*100).toFixed(0)+'%' : '';

      const stampClass = result==='〇'?'atari':result==='✕'?'hazure':'';
      const stampText  = result==='〇'?'的中':result==='✕'?'ハズレ':'';
      html += `<div class="bet-card ${stampClass}">`;
      html += '<div class="bet-top">';
      html += `<div class="horse-num">${num}</div>`;
      html += `<div><div class="horse-name">${uma}</div></div>`;
      html += '<div class="kaime-wrap">';
      html += `<div class="kaime-row">${shiki?`<span class="shiki-badge">${shiki}</span>`:''}<div class="kaime">${kaime}</div></div>`;
      if(kaime2) html += `<div class="kaime-row">${shiki2?`<span class="shiki-badge">${shiki2}</span>`:''}<div class="kaime">${kaime2}</div></div>`;
      html += '</div></div>';

      if(chakujun||rate) {
        html += `<div style="display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">`;
        if(chakujun) html += `着順:<span style="color:var(--text);font-weight:700;margin-left:4px">${chakujun}</span>`;
        if(rate)     html += `<span style="margin-left:8px">回収率:<span style="color:var(--text);font-weight:700;margin-left:4px">${rate}</span></span>`;
        html += `</div>`;
      }
      if(stampClass) html += `<div class="stamp ${stampClass}">${stampText}</div>`;
      html += '</div>';
    });
    // レース毎の回収率を計算
    const raceRows = groups[key];
    const raceRates = raceRows.map(r => r['回収率']).filter(r => r !== '' && r !== null && r !== undefined);
    let raceRateHtml = '';
    if(raceRates.length) {
      const avgRate = raceRates.reduce((s,r) => s + Number(r)*100, 0) / raceRates.length;
      const color = avgRate >= 100 ? 'var(--green)' : 'var(--muted)';
      raceRateHtml = `<div style="text-align:right;font-size:10px;color:${color};margin-top:4px;letter-spacing:1px">回収率: <span style="font-family:'Bebas Neue',sans-serif;font-size:14px">${avgRate.toFixed(0)}%</span></div>`;
    }
    html += raceRateHtml;
    html += '</div>';
  });
  content.innerHTML = html;
}

loadData();
</script>
</body>
</html>
