<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e2e1f">
<link rel="icon" href="favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>成績｜AFRO Horse</title>
<meta name="description" content="AFRO Horse の予想成績。年別・重賞別の的中率・回収率を可視化。">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&family=RocknRoll+One&display=swap" rel="stylesheet">
<style>
:root {
  --turf:#1a4731;
  --turf-deep:#0e2e1f;
  --turf-light:#2d6b4a;
  --turf-bright:#4ca57a;
  --cream:#f8f1de;
  --cream-deep:#ede0bd;
  --cream-soft:#fcf7e8;
  --gold:#c8941d;
  --gold-light:#e8b952;
  --gold-glow:#ffd86d;
  --blue:#1a6fe8;
  --blue-deep:#0d4cb0;
  --blue-light:#5a9fff;
  --blue-glow:rgba(26,111,232,0.30);
  --red:#c5292a;
  --red-deep:#8b1b1b;
  --green:#2da868;
  --green-deep:#1d7849;
  --text:#2a2419;
  --text-soft:#5a4f3d;
  --gray:#7a6e5a;
  /* legacy aliases for inline-styled JS rendering */
  --muted:#7a6e5a;
  --border:rgba(14,46,31,0.25);
  --surface:#fff;
  --surface2:rgba(248,241,222,0.65);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body {
  background: linear-gradient(180deg, var(--cream) 0%, var(--cream-deep) 100%);
  background-attachment: fixed;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.5 0 0 0 0 0.4 0 0 0 0 0.2 0 0 0 0.04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.5;
}
header, .hero, main, footer, .ticker-outer { position:relative; z-index:1; }

/* ===== HEADER ===== */
header {
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(14,46,31,0.96);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:2px solid var(--gold);
  box-shadow:0 2px 12px rgba(14,46,31,0.2);
}
.logo {
  font-family:'Dela Gothic One',cursive;
  font-size:22px;letter-spacing:2px;
  color:var(--cream);text-decoration:none;
}
.logo span { color:var(--gold-light); }
.nav-back {
  color:var(--cream);font-size:0.7rem;
  text-decoration:none;
  letter-spacing:2px;
  border:1px solid var(--gold);
  padding:5px 11px;border-radius:4px;
  font-family:'Bebas Neue',cursive;
  background:rgba(200,148,29,0.10);
  transition:all 0.2s;
}
.nav-back:hover, .nav-back:active { background:var(--gold); color:var(--turf-deep); }

/* ===== HERO (cool blue version) ===== */
.hero {
  margin-top:56px;
  padding:20px 20px 24px;
  text-align:center;
  overflow:hidden;
  background:radial-gradient(ellipse 90% 75% at 50% 50%, var(--cream-soft) 0%, #d8e4f5 60%, var(--blue-light) 100%);
  border-bottom:6px solid var(--blue-deep);
  position:relative;
}
.hero::before {
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(2px 2px at 12% 22%, rgba(255,255,255,0.85), transparent),
    radial-gradient(3px 3px at 88% 28%, rgba(90,159,255,0.65), transparent),
    radial-gradient(1.5px 1.5px at 50% 65%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1.5px 1.5px at 22% 78%, rgba(255,255,255,0.6), transparent),
    radial-gradient(2px 2px at 78% 75%, rgba(90,159,255,0.55), transparent),
    radial-gradient(1.5px 1.5px at 62% 12%, rgba(255,255,255,0.65), transparent);
  pointer-events:none;
  animation:twinkle 4s ease-in-out infinite;
}
@keyframes twinkle { 0%,100% { opacity:0.55; } 50% { opacity:1; } }
.hero-title-img {
  display:block;
  width:100%;
  max-width:580px;
  height:auto;
  margin:0 auto;
  position:relative;z-index:1;
  border-radius:14px;
  filter:
    drop-shadow(0 0 24px rgba(26,111,232,0.35))
    drop-shadow(0 6px 14px rgba(13,76,176,0.25))
    drop-shadow(0 10px 22px rgba(0,0,0,0.30));
}

/* ===== MAIN ===== */
main {
  padding:0 14px 60px;
  max-width:680px;margin:0 auto;
}

/* ===== QUEST BANNER (blue) ===== */
.quest-banner {
  margin:24px 0 18px;
  padding:18px 24px;
  background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.06) 0 8px, transparent 8px 16px),
    linear-gradient(180deg, var(--blue) 0%, var(--blue-deep) 100%);
  color:var(--cream);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  position:relative;
  border:3px solid var(--turf-deep);
  border-radius:0;
  box-shadow:0 6px 0 var(--turf-deep), 0 10px 18px rgba(13,76,176,0.30);
}
.quest-banner::before {
  content:'';position:absolute;
  top:6px;left:6px;right:6px;
  height:3px;
  background:linear-gradient(90deg, transparent, var(--gold-glow), transparent);
}
.quest-banner-en {
  font-family:'Bebas Neue',cursive;
  font-size:13px;letter-spacing:6px;
  color:var(--gold-light);font-weight:700;
  text-shadow:0 2px 0 rgba(0,0,0,0.4);
}
.quest-banner-ja {
  font-family:'Dela Gothic One',cursive;
  font-size:24px;letter-spacing:3px;
  color:var(--cream);
  text-shadow:0 2px 0 var(--blue-deep), 0 4px 0 rgba(0,0,0,0.4), 0 6px 12px rgba(0,0,0,0.3);
}
.quest-banner-meta {
  display:flex;align-items:center;gap:10px;
  margin-top:4px;
  font-family:'Bebas Neue',cursive;
  font-size:10px;letter-spacing:3px;
  color:rgba(255,255,255,0.7);font-weight:700;
}
.quest-banner-meta::before, .quest-banner-meta::after {
  content:'★'; color:var(--gold-glow); font-size:11px;
}

/* ===== ANNUAL RATE BADGE ===== */
.annual-rate-wrap {
  display:flex;justify-content:center;
  margin:0 auto 18px;
}
.annual-rate-box {
  background:#fff;
  border:3px solid var(--turf-deep);
  padding:10px 24px 8px;
  text-align:center;
  position:relative;
  box-shadow:0 5px 0 var(--turf-deep), 0 8px 14px rgba(14,46,31,0.15);
  min-width:200px;
}
.annual-rate-box::before {
  content:'';position:absolute;
  top:3px;left:4px;right:4px;height:2px;
  background:linear-gradient(90deg, transparent, var(--gold-glow), transparent);
}
.annual-rate-label {
  font-family:'Bebas Neue',cursive;
  font-size:11px;letter-spacing:4px;
  color:var(--text-soft);font-weight:700;
  margin-bottom:2px;
}
.annual-rate-val {
  font-family:'Dela Gothic One',cursive;
  font-size:32px;letter-spacing:2px;
  color:var(--blue-deep);
  text-shadow:0 2px 0 rgba(255,255,255,0.6), 0 3px 0 rgba(13,76,176,0.20);
}

/* ===== YEAR TABS ===== */
.year-tabs {
  display:flex;gap:6px;
  padding:0 0 14px;
  overflow-x:auto;
  scrollbar-width:none;
}
.year-tabs::-webkit-scrollbar { display:none; }
.year-tab {
  font-family:'Dela Gothic One',cursive;
  font-size:14px;letter-spacing:2px;
  padding:8px 18px;
  border:3px solid var(--turf-deep);
  border-radius:0;
  background:var(--cream-soft);
  color:var(--turf-deep);
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
  box-shadow:0 3px 0 var(--turf-deep);
  transition:transform 0.1s;
}
.year-tab:active { transform:translateY(2px); box-shadow:0 1px 0 var(--turf-deep); }
.year-tab.active {
  background:linear-gradient(180deg, var(--blue) 0%, var(--blue-deep) 100%);
  color:var(--cream);
  border-color:var(--turf-deep);
  text-shadow:0 2px 0 rgba(0,0,0,0.3);
}

/* ===== FILTER TABS ===== */
.filter-tabs-wrap {
  display:flex;gap:6px;
  padding:0 0 18px;
}
.filter-tab {
  font-family:'RocknRoll One','Noto Sans JP',sans-serif;
  font-size:13px;font-weight:400;
  padding:7px 16px;
  border:2px solid var(--turf-deep);
  border-radius:0;
  background:var(--cream-soft);
  color:var(--turf-deep);
  cursor:pointer;
  box-shadow:0 2px 0 var(--turf-deep);
  transition:transform 0.1s;
}
.filter-tab:active { transform:translateY(1px); box-shadow:0 1px 0 var(--turf-deep); }
.filter-tab.active {
  background:var(--gold-light);
  border-color:var(--turf-deep);
}

/* ===== SUMMARY GRID ===== */
.summary {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:18px;
}
.summary-card {
  background:#fff;
  border:3px solid var(--turf-deep);
  padding:11px 6px 9px;
  text-align:center;
  position:relative;
  box-shadow:0 4px 0 var(--turf-deep);
}
.summary-card::before {
  content:'';position:absolute;
  top:3px;left:4px;right:4px;height:2px;
  background:linear-gradient(90deg, transparent, var(--gold-glow), transparent);
}
.summary-val {
  font-family:'Dela Gothic One',cursive;
  font-size:20px;letter-spacing:0.5px;line-height:1.1;
  color:var(--turf-deep);
  text-shadow:0 1px 0 rgba(255,255,255,0.5);
}
.summary-val.red { color:var(--red); }
.summary-val.green { color:var(--green-deep); }
.summary-label {
  font-family:'RocknRoll One','Noto Sans JP',sans-serif;
  font-size:10px;
  color:var(--text-soft);
  letter-spacing:1px;
  margin-top:5px;font-weight:400;
}

/* ===== CHART CARD ===== */
.chart-card {
  background:#fff;
  border:3px solid var(--turf-deep);
  padding:14px 14px 12px;
  margin-bottom:22px;
  position:relative;
  box-shadow:0 5px 0 var(--turf-deep), 0 8px 14px rgba(14,46,31,0.12);
}
.chart-card::before {
  content:'';position:absolute;
  top:3px;left:4px;right:4px;height:2px;
  background:linear-gradient(90deg, transparent, var(--gold-glow), transparent);
}
.chart-head {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.chart-title {
  font-family:'RocknRoll One','Noto Sans JP',sans-serif;
  font-size:13px;font-weight:400;letter-spacing:2px;
  color:var(--turf-deep);
}
.chart-mode-row { display:flex; gap:5px; }
.chart-mode-btn {
  font-family:'Bebas Neue',cursive;
  font-size:11px;letter-spacing:2px;font-weight:700;
  padding:5px 12px;
  border:2px solid var(--turf-deep);
  background:var(--cream-soft);
  color:var(--turf-deep);
  cursor:pointer;
  box-shadow:0 2px 0 var(--turf-deep);
}
.chart-mode-btn:active { transform:translateY(1px); box-shadow:0 1px 0 var(--turf-deep); }
.chart-mode-btn.active {
  background:linear-gradient(180deg, var(--blue) 0%, var(--blue-deep) 100%);
  color:var(--cream);
  text-shadow:0 1px 0 rgba(0,0,0,0.25);
}

/* ===== LAST UPDATED ===== */
.last-updated {
  text-align:right;
  font-family:'Bebas Neue',cursive;
  font-size:11px;color:var(--text-soft);
  margin-bottom:14px;letter-spacing:2px;font-weight:700;
}

/* ===== STAGE CARD (race group) ===== */
.race-group {
  margin-bottom:24px;
  position:relative;
  animation:fadeUp 0.4s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

/* race-header strip (top of each card) */
.race-header {
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  margin-bottom:0;
  padding:10px 12px;
  background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 6px, transparent 6px 12px),
    linear-gradient(180deg, var(--blue) 0%, var(--blue-deep) 100%);
  border:3px solid var(--turf-deep);
  border-bottom:none;
  position:relative;
}
.race-date {
  font-family:'Bebas Neue',cursive;
  font-size:11px;font-weight:700;letter-spacing:1px;
  color:var(--cream);
  background:rgba(0,0,0,0.25);
  border:1.5px solid rgba(255,255,255,0.30);
  padding:2px 7px;border-radius:3px;
  margin-left:auto;
}
.race-venue {
  font-family:'RocknRoll One','Noto Sans JP',sans-serif;
  font-size:12px;font-weight:400;letter-spacing:2px;
  color:var(--turf-deep);
  background:var(--gold-light);
  padding:2px 8px;border-radius:3px;
  border:1.5px solid var(--turf-deep);
  text-shadow:0 1px 0 rgba(255,255,255,0.4);
}
.race-r {
  font-family:'Bebas Neue',cursive;
  font-size:13px;letter-spacing:2px;
  color:var(--gold-glow);
  background:rgba(0,0,0,0.30);
  border:1.5px solid var(--gold-light);
  padding:2px 8px;border-radius:3px;font-weight:700;
}
.race-name {
  font-family:'RocknRoll One','Noto Sans JP',sans-serif;
  font-size:16px;letter-spacing:0.5px;line-height:1.25;
  color:var(--cream);
  font-weight:400;
  width:100%;margin-top:2px;
  text-shadow:0 2px 0 var(--blue-deep), 0 3px 5px rgba(0,0,0,0.30);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.race-line { display:none; }

/* ===== PICK CARD (bet-card) ===== */
.bet-card {
  background:var(--cream-soft);
  border:3px solid var(--turf-deep);
  border-top:none;
  border-radius:0;
  padding:10px 12px 10px;
  margin-bottom:0;
  position:relative;
  box-shadow:0 5px 0 var(--turf-deep), 0 8px 14px rgba(14,46,31,0.15);
}
.bet-card + .bet-card { border-top:1px dashed var(--blue); }
.bet-card::before {
  content:'';position:absolute;
  top:3px;left:4px;right:4px;height:2px;
  background:linear-gradient(90deg, transparent, var(--gold-glow), transparent);
}
.bet-card.atari { background:#f0fbf3; }
.bet-card.hazure { opacity:0.78; }
.bet-top {
  display:grid;grid-template-columns:46px 1fr auto;
  align-items:center;gap:10px;
}
.horse-num {
  width:46px;height:46px;
  background:linear-gradient(180deg, var(--blue) 0%, var(--blue-deep) 100%);
  color:var(--cream);
  font-family:'Dela Gothic One',cursive;
  font-size:20px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  border-radius:0;
  border:3px solid var(--turf-deep);
  box-shadow:inset 0 3px 0 rgba(255,255,255,0.22), inset 0 -3px 0 rgba(0,0,0,0.18), 0 3px 0 var(--turf-deep);
  position:relative;
  text-shadow:0 2px 0 rgba(0,0,0,0.3);
  margin-top:6px;
}
.horse-num::after {
  content:'No.';
  position:absolute;
  top:-9px;left:-2px;
  font-family:'Bebas Neue',cursive;
  font-size:9px;font-weight:700;letter-spacing:1px;
  background:var(--gold);
  color:var(--turf-deep);
  padding:1px 5px;
  border:1.5px solid var(--turf-deep);
  line-height:1.3;
}
.horse-name {
  font-family:'RocknRoll One','Noto Sans JP',sans-serif;
  font-size:15px;font-weight:400;
  color:var(--turf-deep);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:0.3px;line-height:1.25;
}

.kaime-wrap { text-align:right; flex-shrink:0; }
.kaime-row { display:flex; align-items:center; justify-content:flex-end; gap:6px; }
.kaime-row + .kaime-row { margin-top:4px; padding-top:4px; border-top:1px solid rgba(14,46,31,0.15); }
.shiki-badge {
  display:inline-block;
  font-family:'RocknRoll One','Noto Sans JP',sans-serif;
  font-size:11px;font-weight:400;letter-spacing:1px;
  background:linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
  border:2px solid var(--turf-deep);
  color:var(--turf-deep);
  padding:2px 8px;border-radius:0;
  box-shadow:0 2px 0 var(--turf-deep);
  text-shadow:0 1px 0 rgba(255,255,255,0.4);
}
.kaime {
  font-family:'Dela Gothic One',cursive;
  font-size:20px;letter-spacing:1px;
  color:var(--blue-deep);
  text-align:right;line-height:1.15;
  word-break:break-all;max-width:140px;
  font-weight:900;
  text-shadow:0 2px 0 rgba(255,255,255,0.6), 0 3px 0 rgba(13,76,176,0.20);
}

/* ===== STAMP ===== */
.stamp-wrap { position:relative; }
.stamp {
  position:absolute;
  top:50%;right:10px;left:auto;
  transform:translate(0,-50%) rotate(-12deg) scale(0);
  width:78px;height:78px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Dela Gothic One',cursive;
  font-size:18px;font-weight:900;
  letter-spacing:2px;
  border:5px double;
  opacity:0;
  pointer-events:none;
  z-index:10;
  line-height:1.1;
  text-align:center;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(2px);
  text-shadow:0 2px 0 rgba(255,255,255,0.7);
}
.stamp.atari {
  color:var(--red);
  border-color:var(--red);
  box-shadow:inset 0 0 0 2px rgba(197,41,42,0.20), 0 6px 20px rgba(197,41,42,0.45);
}
.stamp.hazure {
  color:var(--gray);
  border-color:var(--gray);
  box-shadow:inset 0 0 0 2px rgba(122,110,90,0.20), 0 4px 12px rgba(0,0,0,0.15);
}
.stamp.show { animation:stampIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes stampIn {
  0% { transform:translate(0,-50%) rotate(20deg) scale(2); opacity:0; }
  60% { opacity:1; }
  100% { transform:translate(0,-50%) rotate(-12deg) scale(1); opacity:0.95; }
}

/* ===== JUSHO BADGE ===== */
.juso-badge {
  font-family:'Dela Gothic One',cursive;
  font-size:11px;font-weight:900;letter-spacing:1px;
  padding:2px 8px;border-radius:3px;
  vertical-align:middle;
  border:2px solid var(--turf-deep);
  display:inline-block;
  box-shadow:0 2px 0 var(--turf-deep);
}
.juso-badge.g1 { background:linear-gradient(180deg, #ffe55c, #ffd700); color:#1a1000; }
.juso-badge.g2 { background:linear-gradient(180deg, #d8d8d8, #a8a8a8); color:#1a1000; }
.juso-badge.g3 { background:linear-gradient(180deg, #de9a4d, #cd7f32); color:#fff; }

/* ===== EMPTY / NO-DATA ===== */
.empty-state, .no-data {
  text-align:center;padding:50px 20px;
  color:var(--cream);
  background:linear-gradient(180deg, var(--blue) 0%, var(--blue-deep) 100%);
  border:3px solid var(--turf-deep);
  border-radius:0;
  font-weight:700;
  box-shadow:0 6px 0 var(--turf-deep);
  font-family:'RocknRoll One','Noto Sans JP',sans-serif;
}
.empty-state .big {
  font-family:'Dela Gothic One',cursive;
  font-size:38px;font-weight:900;
  color:var(--gold-glow);
  margin-bottom:10px;
  letter-spacing:4px;
  text-shadow:0 3px 0 var(--blue-deep), 0 5px 8px rgba(0,0,0,0.4);
}
.loading-msg {
  text-align:center;
  padding:40px 20px;
  color:var(--text-soft);
  font-family:'Bebas Neue',cursive;
  font-size:13px;letter-spacing:3px;
  font-weight:700;
}
.spinner {
  width:32px;height:32px;
  border:3px solid var(--cream-deep);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  margin:0 auto 10px;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ===== TICKER ===== */
.ticker-outer {
  overflow:hidden;
  background:var(--turf-deep);
  padding:12px 0;
  border-top:4px solid var(--gold);
  border-bottom:4px solid var(--gold);
  margin-top:30px;
}
.ticker-track { display:flex; animation:tick 22s linear infinite; width:max-content; }
.ticker-item {

}

footer {

  header { padding:0 14px; }
  .logo { font-size:20px; }
  .hero { padding:18px 16px 22px; }
  main { padding:0 12px 60px; }
  .quest-banner-ja { font-size:20px; letter-spacing:2px; }
  .quest-banner-en { font-size:11px; letter-spacing:4px; }
  .annual-rate-val { font-size:26px; }
  .summary { gap:6px; }
  .summary-card { padding:9px 4px 7px; }
  .summary-val { font-size:16px; }

  .year-tab { font-size:13px; padding:7px 14px; }

  .chart-title { font-size:12px; }

}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">AFRO<span>Horse</span></a>
  <a href="index.html" class="nav-back">← HOME</a>
</header>

<!-- HERO -->
<div class="hero">
  <img class="hero-title-img" src="images/seiseki_title.png" alt="AFRO HORSE 成績 — 結果をチェック！">

<!-- MAIN -->
<main>
  <div class="quest-banner">
    <div class="quest-banner-en">RESULTS</div>
    <div class="quest-banner-ja">予想成績</div>

  <div class="annual-rate-wrap">

<!-- TICKER -->
<div class="ticker-outer">

    <span class="ticker-item">★ RESULTS</span><span class="ticker-item dot">◆</span>
    <span class="ticker-item">予想成績</span><span class="ticker-item dot">◆</span>
    <span class="ticker-item">AFRO HORSE OFFICIAL</span><span class="ticker-item dot">◆</span>
    <span class="ticker-item">年間回収率</span><span class="ticker-item dot">◆</span>
    <span class="ticker-item">★ RESULTS</span><span class="ticker-item dot">◆</span>
    <span class="ticker-item">予想成績</span><span class="ticker-item dot">◆</span>
    <span class="ticker-item">AFRO HORSE OFFICIAL</span><span class="ticker-item dot">◆</span>

    <a href="contact.html">お問い合わせ</a>

  </div>
  <p class="footer-copy">© 2025 AFRO Horse. All rights reserved.</p>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbym2zqpXFh7W3IlWrNEUtgAEIJOe8Q-VHH8RbJ1C1dLW7B9jI61Lil3OEtA_9rJYQY/exec';

const YEARS = ['2026','2027','2028','2029'];
let allData = {};
let currentYear = '2026';
let currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  document.getElementById('filterAll').classList.toggle('active', f==='all');
  document.getElementById('filterJusho').classList.toggle('active', f==='jusho');
  renderYear(currentYear);
}

function isJusho(row) {
  const v = row['重/平']||'';
  return ['G1','G2','G3'].includes(String(v).trim().toUpperCase());
}

async function loadData() {
  try {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">読み込み中...</div>';
    const res = await fetch(GAS_URL);
    allData = await res.json();
    buildTabs();
    renderYear(currentYear);
    document.getElementById('lastUpdated').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
  } catch(e) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">データの読み込みに失敗しました</div>';
  }
}

function buildTabs() {
  const tabs = document.getElementById('yearTabs');
  tabs.innerHTML = '';
  YEARS.forEach(y => {
    const rows = (allData[y] || []).filter(r => r['本命馬名']);
    if (!rows.length) return; // データなし年は非表示
    const btn = document.createElement('button');
    btn.className = 'year-tab' + (y === currentYear ? ' active' : '');
    btn.textContent = y;
    btn.onclick = () => {
      currentYear = y;
      document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderYear(y);
    };
    tabs.appendChild(btn);
  });
  // 最初のタブを自動選択
  const firstTab = tabs.querySelector('.year-tab');
  if (firstTab) {
    currentYear = firstTab.textContent;
    firstTab.classList.add('active');
  }
}

function renderYear(year) {
  let rows = (allData[year] || []).filter(r => r['本命馬名']);
  if(currentFilter === 'jusho') rows = rows.filter(isJusho);
  renderSummary(rows);
  renderPredictions(rows);
  renderChart(rows);
  // 年間回収率（各行の年間回収率は全行共通なので最初の値を使う）
  const rateRow = (allData[year] || []).find(r => r['年間回収率'] !== '' && r['年間回収率'] !== null);
  const annualRate = rateRow ? (Number(rateRow['年間回収率'])*100).toFixed(1)+'%' : '--';
  const el = document.getElementById('annualRate');
  if(el) {
    el.textContent = annualRate;
    el.style.color = annualRate !== '--' && parseFloat(annualRate) >= 100 ? 'var(--green)' : 'var(--red)';
  }
}

function renderSummary(rows) {
  const total = rows.length;
  const atari = rows.filter(r => r['結果'] === '〇').length;
  const rate = total ? Math.round(atari/total*100) : 0;
  const totalToshi = rows.reduce((s,r) => s + (Number(r['投資'])||0), 0);
  const totalKaishu = rows.reduce((s,r) => s + (Number(r['回収'])||0), 0);
  const nenKaishuRate = totalToshi > 0 ? (totalKaishu/totalToshi*100).toFixed(1)+'%' : '--';
  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="summary-val">${total}</div><div class="summary-label">総予想数</div></div>
    <div class="summary-card"><div class="summary-val red">${atari}</div><div class="summary-label">的中</div></div>
    <div class="summary-card"><div class="summary-val">${rate}%</div><div class="summary-label">的中率</div></div>
    <div class="summary-card"><div class="summary-val">${totalToshi>0?totalToshi.toLocaleString()+'円':'--'}</div><div class="summary-label">投資額</div></div>
    <div class="summary-card"><div class="summary-val ${totalKaishu>=totalToshi?'green':'red'}">${totalToshi>0?totalKaishu.toLocaleString()+'円':'--'}</div><div class="summary-label">回収額</div></div>
    <div class="summary-card"><div class="summary-val ${parseFloat(nenKaishuRate)>=100?'green':'red'}">${nenKaishuRate}</div><div class="summary-label">回収率</div></div>
  `;
}

function formatDate(v) {
  if (!v) return '';
  const d = new Date(v);
  if (isNaN(d)) return String(v);
  return (d.getMonth()+1) + '/' + d.getDate() + '(' + ['日','月','火','水','木','金','土'][d.getDay()] + ')';
}

function renderPredictions(rows) {
  const content = document.getElementById('content');
  if (!rows.length) {
    content.innerHTML = '<div class="empty-state"><div class="big">NO DATA</div><div>データがありません</div></div>';
    return;
  }
  const groups = {}, order = [];
  rows.forEach(row => {
    const key = (row['日付']||'') + '_' + (row['競馬場']||'') + '_' + (row['R']||'');
    if (!groups[key]) { groups[key] = []; order.push(key); }
    groups[key].push(row);
  });
  let html = '';
  order.reverse();
  order.forEach((key, gi) => {
    const bets = groups[key];
    const r0 = bets[0];
    const dateStr = formatDate(r0['日付']);
    const venue = r0['競馬場']||'';
    const rNum = r0['R'] ? r0['R']+'R' : '';
    const raceName = r0['レース名']||'';
    html += `<div class="race-group" style="animation-delay:${gi*0.06}s">`;
    html += '<div class="race-header">';
    const jushoVal = String(r0['重/平']||'').trim().toUpperCase();
    const jushoBadge = jushoVal==='G1'?'<span class="juso-badge g1">G1</span>':jushoVal==='G2'?'<span class="juso-badge g2">G2</span>':jushoVal==='G3'?'<span class="juso-badge g3">G3</span>':'';
    if(dateStr) html += `<div class="race-date">${dateStr}</div>`;
    if(venue)   html += `<div class="race-venue">${venue}</div>`;
    if(rNum)    html += `<div class="race-r">${rNum}</div>`;
    if(raceName)html += `<div class="race-name">${raceName}${jushoBadge}</div>`;
    html += '<div class="race-line"></div></div>';

    bets.forEach(row => {
      const uma    = row['本命馬名']||'---';
      const num    = row['馬番']||'?';
      const shiki  = row['式別']||'';
      const kaime  = row['買い目']||'-';
      const shiki2 = row['式別2']||'';
      const kaime2 = row['買い目2']||'';
      const result  = row['結果']||'';
      const chakujun = row['着順'] ? Number(row['着順'])+'着' : '';
      const rate     = row['回収率'] !== '' && row['回収率'] !== null && row['回収率'] !== undefined ? (Number(row['回収率'])*100).toFixed(0)+'%' : '';

      const stampClass = result==='〇'?'atari':result==='✕'?'hazure':'';
      const stampText  = result==='〇'?'的中':result==='✕'?'ハズレ':'';
      html += `<div class="bet-card ${stampClass}">`;
      html += '<div class="bet-top">';
      html += `<div class="horse-num">${num}</div>`;
      html += `<div><div class="horse-name">${uma}</div></div>`;
      html += '<div class="kaime-wrap">';
      html += `<div class="kaime-row">${shiki?`<span class="shiki-badge">${shiki}</span>`:''}<div class="kaime">${kaime}</div></div>`;
      if(kaime2) html += `<div class="kaime-row">${shiki2?`<span class="shiki-badge">${shiki2}</span>`:''}<div class="kaime">${kaime2}</div></div>`;
      html += '</div></div>';

      const toshi  = row['投資']  ? Number(row['投資']).toLocaleString()+'円' : '';
      const kaishu = row['回収']  ? Number(row['回収']).toLocaleString()+'円' : '';
      const kaishuNum = Number(row['回収']||0);
      const toshiNum  = Number(row['投資']||0);
      const kaishuColor = kaishuNum >= toshiNum ? 'var(--green)' : 'var(--red)';
      const toshiStr = toshiNum > 0 ? toshiNum.toLocaleString()+'円' : '--';
      const kaishuStr = row['回収'] !== '' && row['回収'] !== null && row['回収'] !== undefined ? kaishuNum.toLocaleString()+'円' : '--';
      html += `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">`;
      if(chakujun) {
        html += `<div style="font-size:11px;color:var(--muted);margin-bottom:8px">着順:<span style="color:var(--text);font-weight:700;margin-left:2px">${chakujun}</span></div>`;
      }
      html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">`;
      html += `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px">
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:2px">投資額</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px">${toshiStr}</div>
      </div>`;
      html += `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px">
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:2px">回収額</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:${kaishuColor}">${kaishuStr}</div>
      </div>`;
      html += `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px">
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:2px">回収率</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:${kaishuColor}">${rate||'--'}</div>
      </div>`;
      html += `</div></div>`;
      if(stampClass) html += `<div class="stamp ${stampClass}">${stampText}</div>`;
      html += '</div>';
    });
    html += '</div>';
  });
  content.innerHTML = html;
}

let chartInstance = null;
let chartMode = 'all';
let lastChartRows = [];

function setChartMode(mode) {
  chartMode = mode;
  document.getElementById('chartAll').style.background   = mode==='all'   ? 'var(--red)' : 'transparent';
  document.getElementById('chartAll').style.color        = mode==='all'   ? '#fff' : 'var(--muted)';
  document.getElementById('chartAll').style.borderColor  = mode==='all'   ? 'var(--red)' : 'var(--border)';
  document.getElementById('chartMonth').style.background  = mode==='month' ? 'var(--red)' : 'transparent';
  document.getElementById('chartMonth').style.color       = mode==='month' ? '#fff' : 'var(--muted)';
  document.getElementById('chartMonth').style.borderColor = mode==='month' ? 'var(--red)' : 'var(--border)';
  renderChart(lastChartRows);
}

function renderChart(rows) {
  lastChartRows = rows;
  const canvas = document.getElementById('rateChart');
  if (!canvas) return;

  const filtered = [...rows]
    .filter(r => r['回収率'] !== '' && r['回収率'] !== null && r['回収率'] !== undefined)
    ;  // 古い順（左が古い・右が新しい）

  if (!filtered.length) {
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    return;
  }

  let labels, datasets;

  if (chartMode === 'month') {
    // 月別集計
    const monthMap = {};
    filtered.forEach(r => {
      const d = new Date(r['日付']);
      if (isNaN(d)) return;
      const key = (d.getMonth()+1)+'月';
      if (!monthMap[key]) monthMap[key] = { toshi: 0, kaishu: 0 };
      monthMap[key].toshi  += Number(r['投資']||0);
      monthMap[key].kaishu += Number(r['回収']||0);
    });
    labels = Object.keys(monthMap);
    const monthRates = labels.map(k => {
      const m = monthMap[k];
      return m.toshi > 0 ? parseFloat((m.kaishu/m.toshi*100).toFixed(1)) : 0;
    });
    datasets = [{
      label: '月別回収率',
      data: monthRates,
      borderColor: '#1a6fe8',
      backgroundColor: monthRates.map(v => v >= 100 ? 'rgba(46,204,113,0.6)' : 'rgba(232,40,30,0.5)'),
      borderWidth: 1,
      borderRadius: 4,
    }];
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(canvas, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: '#7a5a5a', font: { size: 10 }, boxWidth: 20 } },
          tooltip: { callbacks: { label: ctx => ctx.dataset.label+': '+ctx.parsed.y+'%' } }
        },
        scales: {
          x: { ticks: { color: '#7a5a5a', font: { size: 11 } }, grid: { color: 'rgba(26,111,232,0.08)' } },
          y: { ticks: { color: '#7a5a5a', font: { size: 9 }, callback: v => v+'%' }, grid: { color: 'rgba(26,111,232,0.08)' } }
        }
      },
      plugins: [{
        id: 'line100',
        afterDraw(chart) {
          const ctx = chart.ctx; const yScale = chart.scales.y; if (!yScale) return;
          const y = yScale.getPixelForValue(100);
          ctx.save(); ctx.strokeStyle='rgba(46,204,113,0.5)'; ctx.lineWidth=1; ctx.setLineDash([6,3]);
          ctx.beginPath(); ctx.moveTo(chart.chartArea.left,y); ctx.lineTo(chart.chartArea.right,y); ctx.stroke(); ctx.restore();
        }
      }]
    });
    return;
  }

  // 全体（週毎集計→累積折れ線）
  // 回収率列がなくても投資・回収列から計算する
  const allRows = [...rows].filter(r => r['本命馬名']); // 古い順（シートの上から）
  const weekMap = {};
  const weekOrder = [];
  allRows.forEach(r => {
    const d = new Date(r['日付']);
    if (isNaN(d)) return;
    const sun = new Date(d);
    sun.setDate(d.getDate() - d.getDay());
    const key = (sun.getMonth()+1)+'/'+(sun.getDate());
    if (!weekMap[key]) { weekMap[key] = { toshi:0, kaishu:0 }; weekOrder.push(key); }
    weekMap[key].toshi  += Number(r['投資']||0);
    weekMap[key].kaishu += Number(r['回収']||0);
  });
  labels = weekOrder;
  let cumToshi = 0, cumKaishu = 0;
  const cumRates = weekOrder.map(k => {
    cumToshi  += weekMap[k].toshi;
    cumKaishu += weekMap[k].kaishu;
    return cumToshi > 0 ? parseFloat((cumKaishu/cumToshi*100).toFixed(1)) : 0;
  });
  const raceRates = weekOrder.map(k => {
    const w = weekMap[k];
    return w.toshi > 0 ? parseFloat((w.kaishu/w.toshi*100).toFixed(0)) : 0;
  });

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '累積回収率',
          data: cumRates,
          borderColor: '#1a6fe8',
          backgroundColor: 'rgba(26,111,232,0.1)',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#1a6fe8',
          tension: 0.3,
          fill: true,
        },
        {
          label: 'レース毎',
          data: raceRates,
          borderColor: 'rgba(255,255,255,0.2)',
          backgroundColor: 'transparent',
          borderWidth: 1,
          pointRadius: 2,
          pointBackgroundColor: 'rgba(255,255,255,0.3)',
          tension: 0.3,
          borderDash: [4,4],
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#7a5a5a', font: { size: 10 }, boxWidth: 20 } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label+': '+ctx.parsed.y+'%' } }
      },
      scales: {
        x: { ticks: { color: '#7a5a5a', font: { size: 9 }, maxRotation: 45 }, grid: { color: 'rgba(26,111,232,0.08)' } },
        y: { ticks: { color: '#7a5a5a', font: { size: 9 }, callback: v => v+'%' }, grid: { color: 'rgba(26,111,232,0.08)' } }
      }
    },
    plugins: [{
      id: 'line100',
      afterDraw(chart) {
        const ctx = chart.ctx;
        const yScale = chart.scales.y;
        if (!yScale) return;
        const y = yScale.getPixelForValue(100);
        ctx.save();
        ctx.strokeStyle = 'rgba(46,204,113,0.5)';
        ctx.lineWidth = 1;
        ctx.setLineDash([6,3]);
        ctx.beginPath();
        ctx.moveTo(chart.chartArea.left, y);
        ctx.lineTo(chart.chartArea.right, y);
        ctx.stroke();
        ctx.restore();
      }
    }]
  });
}

loadData();
</script>
