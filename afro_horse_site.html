<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>予想 — AFRO Horse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#FF1A1A;--black:#080808;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--black);color:#fff;font-family:"Noto Sans JP",sans-serif;min-height:100vh;overflow-x:hidden;}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(8,8,8,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,26,26,0.2);box-shadow:0 2px 20px rgba(255,26,26,0.08);}
.nav-logo{font-family:"Bebas Neue",cursive;font-size:22px;letter-spacing:3px;}
.nav-logo em{color:var(--red);font-style:normal;}
.nav-date{font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.3);}
.hero{padding:72px 16px 20px;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 100% 80% at 50% 0%,rgba(255,26,26,0.12) 0%,transparent 70%);pointer-events:none;}
.hero-inner{display:flex;align-items:center;justify-content:center;gap:16px;max-width:600px;margin:0 auto;}
.hero-text{text-align:left;}
.hero-chara{width:140px;height:auto;flex-shrink:0;filter:drop-shadow(0 0 20px rgba(255,26,26,0.15));}
.hero-eyebrow{font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:8px;color:rgba(255,26,26,0.7);margin-bottom:6px;}
.hero-main{font-family:"Bebas Neue",cursive;font-size:clamp(32px,10vw,56px);letter-spacing:6px;line-height:0.9;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.hero-main em{-webkit-text-fill-color:transparent;background:linear-gradient(135deg,var(--red),#ff6b6b);-webkit-background-clip:text;background-clip:text;font-style:normal;}
.filter-wrap{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.filter-label{font-family:"Bebas Neue",cursive;font-size:10px;letter-spacing:3px;color:rgba(255,26,26,0.7);width:28px;flex-shrink:0;}
.fbtn{background:#111;border:1px solid #222;color:rgba(255,255,255,0.4);padding:5px 12px;border-radius:20px;cursor:pointer;font-family:"Bebas Neue",cursive;font-size:13px;letter-spacing:1px;transition:all .15s;}
.fbtn:hover{border-color:var(--red);color:var(--red);}
.fbtn.active{background:var(--red);border-color:var(--red);color:#fff;}
.pickup-section{margin:0 16px 20px;background:#111;border:1px solid rgba(255,26,26,0.25);border-radius:10px;padding:16px;position:relative;overflow:hidden;}
.pickup-section::before{content:"";position:absolute;top:-40%;left:-20%;width:140%;height:140%;background:radial-gradient(ellipse at 30% 20%,rgba(255,26,26,0.06) 0%,transparent 60%);pointer-events:none;}
.pickup-label{font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:6px;color:var(--red);margin-bottom:12px;}
.pickup-list{display:flex;gap:10px;flex-wrap:wrap;}
.pickup-card{background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .2s;min-width:140px;}
.pickup-card:hover,.pickup-card.sel{border-color:var(--red);background:rgba(255,26,26,0.05);}
.pickup-race{font-family:"Bebas Neue",cursive;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:4px;}
.pickup-name-wrap{display:flex;align-items:center;gap:6px;}
.pickup-hon{width:20px;height:20px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",cursive;font-size:11px;flex-shrink:0;}
.pickup-name{font-size:.9rem;font-weight:700;}
.pickup-ability{font-family:"Bebas Neue",cursive;font-size:10px;letter-spacing:2px;color:rgba(255,26,26,0.6);margin-top:4px;}
.races-wrap{padding:0 16px;}
.race-section{margin-bottom:24px;}
.race-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,26,26,0.15);}
.race-place{font-family:"Bebas Neue",cursive;font-size:1.4rem;letter-spacing:3px;color:var(--red);}
.race-name-txt{font-weight:700;font-size:.9rem;}
.race-dist{font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.25);margin-left:auto;}
.horses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.horse-card{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.horse-card::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% -20%,rgba(255,26,26,0.04) 0%,transparent 70%);pointer-events:none;}
.horse-card:hover{border-color:rgba(255,26,26,0.4);transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,26,26,0.08);}
.horse-card.rank-1{border-color:rgba(255,26,26,0.35);}
.horse-card.rank-2{border-color:rgba(255,255,255,0.1);}
.horse-card.rank-3{border-color:rgba(255,255,255,0.06);}
.horse-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.mark{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",cursive;font-size:.85rem;flex-shrink:0;}
.mark-1{background:var(--red);color:#fff;}
.mark-2{background:#2a2a2a;color:rgba(255,255,255,0.6);}
.mark-3{background:#1e1e1e;color:rgba(255,255,255,0.4);}
.mark-n{background:#181818;color:#333;}
.horse-name{font-size:.95rem;font-weight:900;flex:1;}
.horse-jockey{font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-top:2px;}
.radar-wrap{display:flex;justify-content:center;margin:6px 0 10px;}
.stats{display:flex;flex-direction:column;gap:5px;}
.stat-row{display:flex;align-items:center;gap:6px;}
.stat-label{color:rgba(255,255,255,0.25);width:36px;flex-shrink:0;font-family:"Bebas Neue",cursive;font-size:10px;letter-spacing:1px;}
.stat-bar{flex:1;height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),#ff6b6b);transition:width .5s ease;}
.stat-val{color:rgba(255,26,26,0.7);width:22px;text-align:right;font-family:"Bebas Neue",cursive;font-size:11px;}
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-box{position:relative;width:100%;max-width:400px;background:#111;border-radius:12px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.8);animation:popIn .25s ease;border:1px solid rgba(255,26,26,0.2);}
@keyframes popIn{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #1e1e1e;}
.modal-head-name{font-size:1.1rem;font-weight:900;}
.modal-head-sub{font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.3);}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.4);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;}
.modal-close:hover{color:#fff;}
.modal-body{padding:16px;}
.modal-radar{display:flex;justify-content:center;margin-bottom:16px;}
.modal-stats{display:flex;flex-direction:column;gap:8px;}
.modal-stat-row{display:flex;align-items:center;gap:10px;}
.modal-stat-label{font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.3);width:44px;}
.modal-stat-bar{flex:1;height:5px;background:#1e1e1e;border-radius:3px;overflow:hidden;}
.modal-stat-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),#ff6b6b);transition:width .7s ease;}
.modal-stat-val{font-family:"Bebas Neue",cursive;font-size:14px;color:var(--red);width:28px;text-align:right;}
footer{padding:24px 16px 48px;text-align:center;border-top:1px solid rgba(255,26,26,0.08);margin-top:32px;}
.footer-logo{font-family:"Bebas Neue",cursive;font-size:20px;letter-spacing:4px;margin-bottom:4px;}
.footer-logo em{color:var(--red);font-style:normal;}
.footer-copy{font-size:10px;color:rgba(255,255,255,0.12);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.horse-card{animation:fadeUp .3s ease both;}
</style>
</head>

const marks=['◎','○','▲','△',''];
const markClass=['mark-1','mark-2','mark-3','mark-n','mark-n'];
const cardClass=['rank-1','rank-2','rank-3','',''];
const labels=['スピード','スタミナ','瞬発力','安定性','騎手'];
const labelsEn=['SPD','STM','INS','STB','JKY'];
function calcAb(h){
  return [
    Math.round(Math.min(100,Math.max(0,(h.speed||0)*1.5+40))),
    Math.round(Math.min(100,Math.max(0,(h.jisseki||0)*12+35))),
    Math.round(Math.min(100,Math.max(0,h.agari_trend!=null?h.agari_trend*30+55:50))),
    Math.round(Math.min(100,Math.max(0,100-Math.abs(h.trend||0)*8))),
    Math.round(Math.min(100,Math.max(0,(h.jockey||0.07)*600)))
  ];
}
function drawRadar(ab,size,mini){
  const cx=size/2,cy=size/2,r=size*0.36,n=ab.length;
  const ang=ab.map((_,i)=>(Math.PI*2*i/n)-Math.PI/2);
  let s=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
  [0.25,0.5,0.75,1].forEach(sc=>{
    const pts=ang.map(a=>`${cx+r*sc*Math.cos(a)},${cy+r*sc*Math.sin(a)}`).join(' ');
    s+=`<polygon points="${pts}" fill="none" stroke="rgba(255,26,26,0.1)" stroke-width="0.5"/>`;
  });
  ang.forEach(a=>{s+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="rgba(255,26,26,0.08)" stroke-width="0.5"/>`;});
  const pts=ab.map((v,i)=>`${cx+r*(v/100)*Math.cos(ang[i])},${cy+r*(v/100)*Math.sin(ang[i])}`).join(' ');
  s+=`<polygon points="${pts}" fill="rgba(255,26,26,0.15)" stroke="#FF1A1A" stroke-width="1.5"/>`;
  ab.forEach((v,i)=>{s+=`<circle cx="${cx+r*(v/100)*Math.cos(ang[i])}" cy="${cy+r*(v/100)*Math.sin(ang[i])}" r="2.5" fill="#FF1A1A"/>`;});
  if(!mini){ang.forEach((a,i)=>{const lx=cx+(r+14)*Math.cos(a),ly=cy+(r+14)*Math.sin(a);s+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,0.28)" font-size="8" font-family="'Bebas Neue',cursive" letter-spacing="1">${labelsEn[i]}</text>`;});}
  return s+'</svg>';
}
function renderPickup(){
  const list=document.getElementById('pickupList');
  const picks=[];
  (RACE_DATA||[]).forEach(race=>{
    if(!race.horses||race.is_jump) return;
    const sorted=[...race.horses].sort((a,b)=>(b.gbm_prob||0)-(a.gbm_prob||0));
    const top=sorted[0];
    if((top.gbm_prob||0)>=0.35) picks.push({race,horse:top});
  });
  if(!picks.length){list.innerHTML='<div style="font-family:\'Bebas Neue\',cursive;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.2)">NO SPOTLIGHT TODAY</div>';return;}
  list.innerHTML=picks.map(({race,horse})=>{
    const ab=calcAb(horse);
    const total=Math.round(ab.reduce((s,v)=>s+v,0)/5);
    return `<div class="pickup-card" onclick="selectRace('${race.race_id}')"><div class="pickup-race">${race.place} ${race.r}R</div><div class="pickup-name-wrap"><div class="pickup-hon">◎</div><div class="pickup-name">${horse.name}</div></div><div class="pickup-ability">ABILITY ${total}</div></div>`;
  }).join('');
}
function renderTabs(){
  const dates=[...new Set((RACE_DATA||[]).map(r=>r.date_label||'').filter(Boolean))].sort();
  const places=[...new Set((RACE_DATA||[]).map(r=>r.place))];
  const rnums=[...new Set((RACE_DATA||[]).map(r=>r.r))].sort((a,b)=>parseInt(a)-parseInt(b));
  const dateRow=document.getElementById('dateRow');
  if(dates.length>1){
    dateRow.style.display='';
    dateRow.innerHTML=`<span class="filter-label">日付</span><button class="fbtn active" onclick="filterAllDate(this)">全日</button>`+dates.map(d=>`<button class="fbtn" onclick="filterDate('${d}',this)">${d}</button>`).join('');
  }
  document.getElementById('placeRow').innerHTML=`<span class="filter-label">場所</span><button class="fbtn active" onclick="filterAll(this)">ALL</button>`+places.map(p=>`<button class="fbtn" onclick="filterPlace('${p}',this)">${p}</button>`).join('');
  document.getElementById('rRow').innerHTML=`<span class="filter-label">R</span><button class="fbtn active" onclick="filterAllR(this)">ALL</button>`+rnums.map(r=>`<button class="fbtn" onclick="filterR('${r}',this)">${r}R</button>`).join('');
}
let curPlace='all', curR='all', curDate='all';
function applyFilter(){
  document.querySelectorAll('.race-section').forEach(el=>{
    const dm = curDate==='all' || el.dataset.date===curDate;
    const pm = curPlace==='all' || el.dataset.place===curPlace;
    const rm = curR==='all' || el.dataset.r===curR;
    el.style.display = (dm && pm && rm) ? '' : 'none';
  });
}
function filterAllDate(btn){document.querySelectorAll('#dateRow .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curDate='all';applyFilter();}
function filterDate(d,btn){document.querySelectorAll('#dateRow .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curDate=d;applyFilter();}
function filterAll(btn){document.querySelectorAll('#placeRow .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curPlace='all';applyFilter();}
function filterAllR(btn){document.querySelectorAll('#rRow .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curR='all';applyFilter();}
function filterPlace(p,btn){document.querySelectorAll('#placeRow .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curPlace=p;applyFilter();}
function filterR(rnum,btn){document.querySelectorAll('#rRow .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curR=rnum;applyFilter();}
function selectRace(id){document.querySelectorAll('.race-section').forEach(el=>el.style.display=el.dataset.raceid===id?'':'none');}
function renderRaces(){
  const c=document.getElementById('raceContainer');
  c.innerHTML=(RACE_DATA||[]).map(race=>{
    if(race.is_jump) return `<div class="race-section" data-place="${race.place}" data-raceid="${race.race_id}" data-r="${race.r}" data-date="${race.date_label||''}"><div class="race-head"><span class="race-place">${race.place} ${race.r}R</span><span class="race-name-txt">${race.race_name}</span><span class="race-dist" style="color:rgba(255,26,26,0.4)">🚧 障害</span></div></div>`;
    const sorted=[...(race.horses||[])].sort((a,b)=>(b.gbm_prob||b.composite||0)-(a.gbm_prob||b.composite||0));
    const cards=sorted.map((h,i)=>{
      const ab=calcAb(h);const idx=Math.min(i,4);
      const radar=drawRadar(ab,100,true);
      const bars=labelsEn.map((lb,si)=>`<div class="stat-row"><span class="stat-label">${lb}</span><div class="stat-bar"><div class="stat-fill" style="width:${ab[si]}%"></div></div><span class="stat-val">${ab[si]}</span></div>`).join('');
      const hd=JSON.stringify(h).replace(/"/g,'&quot;');
      return `<div class="horse-card ${cardClass[idx]}" onclick="openModal(${hd},${i})" style="animation-delay:${i*0.04}s"><div class="horse-top"><div class="mark ${markClass[idx]}">${marks[idx]||''}</div><div><div class="horse-name">${h.name}</div><div class="horse-jockey">${h.jockey||''}</div></div></div><div class="radar-wrap">${radar}</div><div class="stats">${bars}</div></div>`;
    }).join('');
    return `<div class="race-section" data-place="${race.place}" data-raceid="${race.race_id}" data-r="${race.r}" data-date="${race.date_label||''}"><div class="race-head"><span class="race-place">${race.place} ${race.r}R</span><span class="race-name-txt">${race.race_name}</span><span class="race-dist">${race.distance||''}</span></div><div class="horses-grid">${cards}</div></div>`;
  }).join('');
}
function openModal(h,rank){
  const ab=calcAb(h);const idx=Math.min(rank,4);
  document.getElementById('modalName').textContent=(marks[idx]||'')+' '+h.name;
  document.getElementById('modalSub').textContent=(h.jockey||'')+'　'+(h.trainer||'');
  document.getElementById('modalRadar').innerHTML=drawRadar(ab,180,false);
  document.getElementById('modalStats').innerHTML=labels.map((lb,i)=>`<div class="modal-stat-row"><span class="modal-stat-label">${labelsEn[i]}</span><div class="modal-stat-bar"><div class="modal-stat-fill" style="width:${ab[i]}%"></div></div><span class="modal-stat-val">${ab[i]}</span></div>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('navDate').textContent=new Date().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'}).toUpperCase();
renderTabs();renderPickup();renderRaces();
</script>
