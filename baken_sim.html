<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>馬券シミュレーター — AFRO Horse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#FF1A1A;--black:#080808;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--black);color:#fff;font-family:"Noto Sans JP",sans-serif;min-height:100vh;overflow-x:hidden;}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(8,8,8,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,26,26,0.2);box-shadow:0 2px 20px rgba(255,26,26,0.08);}
.nav-logo{font-family:"Bebas Neue",cursive;font-size:22px;letter-spacing:3px;}
.nav-logo em{color:var(--red);font-style:normal;}
.nav-back{font-family:"Bebas Neue",cursive;font-size:13px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-decoration:none;}
/* HERO TITLE */
.hero-title-wrap{
  padding:72px 16px 24px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero-title-wrap::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 100% 80% at 50% 0%, rgba(255,26,26,0.15) 0%, transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{
  font-family:"Bebas Neue",cursive;
  font-size:11px;letter-spacing:8px;
  color:rgba(255,26,26,0.7);
  margin-bottom:6px;
}
.hero-main{
  font-family:"Bebas Neue",cursive;
  font-size:clamp(36px,11vw,64px);
  letter-spacing:6px;
  line-height:0.9;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.7) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
}
.hero-main em{
  -webkit-text-fill-color:transparent;
  background:linear-gradient(135deg,var(--red),#ff6b6b);
  -webkit-background-clip:text;background-clip:text;
  font-style:normal;
}
.hero-sub{
  font-family:"Bebas Neue",cursive;
  font-size:11px;letter-spacing:5px;
  color:rgba(255,255,255,0.25);
}
.form-wrap{padding:68px 16px 20px;}
.sec-label{font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:5px;color:var(--red);margin-bottom:10px;}
.step-label{font-family:"Bebas Neue",cursive;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.55);margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.step-label::after{content:"";flex:1;height:1px;background:rgba(255,26,26,0.12);}
.bg-selector{display:flex;gap:10px;margin-bottom:16px;}
.bg-opt{flex:1;border-radius:10px;overflow:hidden;border:2px solid #1e1e1e;cursor:pointer;transition:all 0.2s;}
.bg-opt.active{border-color:var(--red);box-shadow:0 0 0 2px var(--red);}
.bg-opt img{width:100%;display:block;}
.bg-opt-label{font-family:"Bebas Neue",cursive;font-size:12px;letter-spacing:2px;text-align:center;padding:5px;background:#0d0d0d;color:rgba(255,255,255,0.4);}
.bg-opt.active .bg-opt-label{background:rgba(255,26,26,0.15);color:var(--red);}
.f-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.f-row{display:flex;gap:8px;}
.f-group{display:flex;flex-direction:column;gap:4px;flex:1;}
.f-group.sm{flex:0 0 72px;}
.f-group.xs{flex:0 0 58px;}
.f-label{font-family:"Bebas Neue",cursive;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.28);}
.f-input,.f-select{background:#111;border:1px solid #252525;border-radius:8px;padding:10px 12px;color:#fff;font-size:15px;font-family:"Noto Sans JP",sans-serif;font-weight:700;outline:none;width:100%;transition:border-color 0.2s;-webkit-appearance:none;}
.f-input:focus,.f-select:focus{border-color:var(--red);}
.f-input::placeholder{color:rgba(255,255,255,0.15);font-weight:400;}
.f-num{text-align:center;font-family:"Bebas Neue",cursive;font-size:22px;padding:8px 6px;}
.f-hint{font-size:11px;color:rgba(255,255,255,0.22);margin-top:4px;}
.line-btn{flex:1;padding:10px;background:#111;border:1px solid #252525;border-radius:8px;color:rgba(255,255,255,0.4);font-family:"Bebas Neue",cursive;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.line-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
.gen-btn{width:100%;padding:15px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:"Bebas Neue",cursive;font-size:22px;letter-spacing:4px;cursor:pointer;box-shadow:0 4px 20px rgba(255,26,26,0.3);margin-bottom:20px;}
.gen-btn:active{transform:scale(0.97);}
.preview-outer{padding:0 12px 32px;max-width:560px;margin:0 auto;}
.preview-label{font-family:"Bebas Neue",cursive;font-size:11px;letter-spacing:5px;color:var(--red);margin-bottom:10px;text-align:center;}
.canvas-wrap{border-radius:4px;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,0.6);}
#cv{width:100%;height:auto;display:block;}
.ticket-actions{display:flex;gap:10px;margin-top:12px;max-width:560px;margin-left:auto;margin-right:auto;padding:0 12px;}
.t-act{flex:1;padding:13px;border:none;border-radius:8px;font-family:"Bebas Neue",cursive;font-size:16px;letter-spacing:2px;cursor:pointer;}
.t-act:active{transform:scale(0.96);}
.btn-save{background:#fff;color:#111;}
.btn-share{background:var(--red);color:#fff;}
footer{padding:24px 24px 52px;text-align:center;border-top:1px solid rgba(255,26,26,0.08);margin-top:24px;}
.footer-logo{font-family:"Bebas Neue",cursive;font-size:20px;letter-spacing:4px;margin-bottom:4px;}
.footer-logo em{color:var(--red);font-style:normal;}
.footer-copy{font-size:10px;color:rgba(255,255,255,0.15);}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal-box{
  position:relative;width:100%;max-width:540px;
  background:#111;border-radius:12px;overflow:hidden;
  box-shadow:0 16px 48px rgba(0,0,0,0.8);
  animation:popIn 0.25s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid #222;
}
.modal-title{font-family:"Bebas Neue",cursive;font-size:14px;letter-spacing:4px;color:var(--red);}
.modal-close{
  background:none;border:none;color:rgba(255,255,255,0.5);
  font-size:22px;cursor:pointer;line-height:1;padding:0 4px;
}
.modal-close:hover{color:#fff;}
.modal-body{padding:12px;}
.modal-body canvas{width:100%;height:auto;display:block;border-radius:4px;}
.modal-actions{display:flex;gap:10px;padding:12px 12px 14px;}
.modal-actions .t-act{flex:1;padding:13px;border:none;border-radius:8px;font-family:"Bebas Neue",cursive;font-size:16px;letter-spacing:2px;cursor:pointer;}
.modal-actions .btn-save{background:#fff;color:#111;}
.modal-actions .btn-share{background:var(--red);color:#fff;}
</style>
</head>

var IMGS=[null,null,null];
var curBg=0;

function selectBg(i){
  curBg=i;
  document.querySelectorAll(".bg-opt").forEach(function(el,j){el.classList.toggle("active",i===j);});
  render();
}

function g(id){return document.getElementById(id).value;}

function fnt(sz,type,w){
  return w+" "+Math.round(sz)+"px "+( type==="serif" ? "'Noto Serif JP',serif" : "'Noto Sans JP',sans-serif" );
}

var lineMode = 1; // 1 or 2

function setLines(n){
  lineMode = n;
  document.getElementById("btn1line").classList.toggle("active", n===1);
  document.getElementById("btn2line").classList.toggle("active", n===2);
  document.getElementById("line1wrap").style.display = n===1 ? "" : "none";
  document.getElementById("line2wrap").style.display = n===2 ? "" : "none";
  render();
}

function updateCounters(){
  var v1 = document.getElementById("inFree1").value;
  var v2a = document.getElementById("inFree2a").value;
  var v2b = document.getElementById("inFree2b").value;
  document.getElementById("cnt1").textContent  = v1.length+" / 9文字";
  document.getElementById("cnt2a").textContent = v2a.length+" / 16文字";
  document.getElementById("cnt2b").textContent = v2b.length+" / 16文字";
}

/* 右上フリーテキスト
   全角1文字 ≒ fontSize px なので 幅÷文字数 で必ず収まる
   1行: 枠の高さ×0.65 を上限に大きく表示
   2行: 枠の高さ×0.30 を1行分の上限に2段で表示 */
function drawFreeText(ctx,sx,sy){
  var bx1=310*sx, by1=16*sy, bx2=975*sx, by2=116*sy;
  var bw=bx2-bx1, bh=by2-by1;
  var cx=(bx1+bx2)/2;
  var padX=bw*0.03;
  var maxW=bw-padX*2;

  ctx.save();
  ctx.beginPath();
  ctx.rect(bx1+3,by1+3,bw-6,bh-6);
  ctx.clip();
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillStyle="#111";

  if(lineMode===1){
    var text = document.getElementById("inFree1").value;
    if(!text){ctx.restore();return;}
    var sz = Math.min(bh*0.55, maxW/text.length);
    sz = Math.max(8,sz);
    ctx.font = fnt(sz,"sans","900");
    // 1文字分右にずらす・少し上に
    ctx.fillText(text, cx + sz*1.5, (by1+by2)/2 - bh*0.18);
  } else {
    var t1 = document.getElementById("inFree2a").value;
    var t2 = document.getElementById("inFree2b").value;
    if(!t1&&!t2){ctx.restore();return;}
    var lineH = bh*0.46;
    var gap   = lineH*0.65*0.1;
    var y1 = by1 + bh*0.5 - lineH*0.5 - gap;
    var y2 = by1 + bh*0.5 + lineH*0.5 + gap;
    var leftX = bx1 + padX + lineH*0.65*5;
    ctx.textAlign = "left";
    if(t1){
      var sz1 = lineH*0.65;
      ctx.font = fnt(sz1,"sans","900");
      ctx.fillText(t1, leftX, y1 - sz1*0.3);
    }
    if(t2){
      var sz2 = lineH*0.65;
      ctx.font = fnt(sz2,"sans","900");
      ctx.fillText(t2, leftX, y2 - sz2*0.6 - sz2*0.3);
    }
  }
  ctx.restore();
}

function drawText(ctx,text,x,y,sz,type,w,color,align,sx,sy){
  if(!text) return;
  ctx.save();
  ctx.font=fnt(sz*sy,type,w);
  ctx.fillStyle=color;
  ctx.textAlign=align||"left";
  ctx.textBaseline="middle";
  ctx.fillText(text,x*sx,y*sy);
  ctx.restore();
}

function render(){
  var img=IMGS[curBg];
  if(!img) return;
  var W=img.naturalWidth, H=img.naturalHeight;
  var cv=document.getElementById("cv");
  cv.width=W; cv.height=H;
  var ctx=cv.getContext("2d");
  var sx=W/REF_W, sy=H/REF_H;

  ctx.drawImage(img,0,0,W,H);

  var venue =g("inVenue"), yobi=g("inYobi"), rnum=g("inR");
  var hnum  =g("inHnum")||"?", hname=g("inHname");
  var amt   =parseInt(g("inAmt"))||5000;
  var header=g("inHeader");
  var rname1=document.getElementById("inRname1").value;
  var rname2=document.getElementById("inRname2").value;

  var digits = String(amt).length;          // 桁数
  var starCount = Math.max(0, 5 - (digits - 1)); // 桁が増えるほど星が減る（最大4★）
  var starsO = "☆☆" + amt.toLocaleString() + "  円";
  var starsF = "合計　" + "★".repeat(starCount) + amt.toLocaleString() + " 円";

  /* 左パネル */
  drawText(ctx,header, 30, 28, 24,"sans","700","#555","left",  sx,sy);
  drawText(ctx,venue,  30,116, 62,"serif","900","#111","left",  sx,sy);
  /* 曜日：競馬場の直後、少し小さく、下端を競馬場に揃える */
  /* venue bottom = 116 + 62/2 = 147, yobi sz=46 → middle = 147 - 23 = 124 */
  drawText(ctx,yobi,  160,124, 46,"serif","900","#111","left",  sx,sy);

  /* R番号 黒ボックス */
  ctx.fillStyle="#111";
  ctx.fillRect(30*sx,160*sy,124*sx,72*sy);
  drawText(ctx,rnum,   92,196, 48,"sans","900","#fff","center",sx,sy);
  /* レースラベル */
  drawText(ctx,"レース",154,212, 46,"serif","900","#111","left",  sx,sy);

  /* レース名（2行対応） */
  if(rname1) drawText(ctx,rname1,30,490,22,"sans","700","#444","left",sx,sy);
  if(rname2) drawText(ctx,rname2,30,518,22,"sans","700","#444","left",sx,sy);

  /* 馬番ボックス */
  var bx=(490-46+52)*sx, by=(274-35)*sy, bw=93*sx, bh=71*sy;
  var lw=Math.max(1.5,H*0.003);
  ctx.fillStyle="rgba(255,255,255,0.88)";
  ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle="#111"; ctx.lineWidth=lw;
  ctx.strokeRect(bx,by,bw,bh);
  drawText(ctx,hnum, 542,274, 52,"serif","900","#111","center",sx,sy);

  /* 馬名 */
  drawText(ctx,hname,600,274,44,"sans","900","#111","left",sx,sy);

  /* ☆金額（右寄せ） */
  ctx.save();
  ctx.font=fnt(30*sy,"sans","700");
  ctx.fillStyle="#444";
  ctx.textAlign="right";
  ctx.textBaseline="middle";
  ctx.fillText(starsO,973*sx,337*sy);
  ctx.restore();

  /* 合計（円を右端固定・右寄せ） */
  ctx.save();
  ctx.font=fnt(30*sy,"sans","900");
  ctx.fillStyle="#111";
  ctx.textAlign="right";
  ctx.textBaseline="middle";
  ctx.fillText(starsF,973*sx,590*sy);
  ctx.restore();

  /* 右上フリーテキスト */
  updateCounters();
  drawFreeText(ctx,sx,sy);
}

function openModal(){
  render();
  // copy hidden canvas to modal canvas
  var src=document.getElementById("cv");
  var dst=document.getElementById("cvModal");
  dst.width=src.width; dst.height=src.height;
  dst.getContext("2d").drawImage(src,0,0);
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow="hidden";
}

function closeModal(e){
  if(e.target===document.getElementById("modalOverlay")) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow="";
}

async function saveImg(){
  var now=new Date();
  var ts=String(now.getFullYear()).slice(2)+String(now.getMonth()+1).padStart(2,"0")+String(now.getDate()).padStart(2,"0")+"_"+String(now.getHours()).padStart(2,"0")+String(now.getMinutes()).padStart(2,"0");
  var fn=prompt("ファイル名（拡張子不要）","afro_baken_"+ts);
  if(fn===null)return;
  var a=document.createElement("a");
  a.download=(fn||"afro_baken_"+ts)+".png";
  a.href=document.getElementById("cv").toDataURL("image/png");
  a.click();
}

async function shareImg(){
  document.getElementById("cv").toBlob(async function(blob){
    var file=new File([blob],"afro_baken.png",{type:"image/png"});
    if(navigator.share&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"AFRO Horse 馬券"});
    }else{
      window.open(URL.createObjectURL(blob),"_blank");
    }
  },"image/png");
}
