<script>
// ===== 今週のピック自動表示 =====
(function() {
  const pickContainer = document.getElementById('this-week-pick');
  if (!pickContainer) return;

  let races = getThisWeekendRaces();
  let label = '今週末';

  if (races.length === 0) {
    races = getNextWeekendRaces();
    label = '来週末';
  }

  if (races.length === 0) {
    pickContainer.innerHTML = `
      <div class="this-week-header">
        <span class="this-week-badge">★ THIS WEEK</span>
        <span class="this-week-label">注目の重賞</span>
      </div>
      <div class="tw-empty">直近の重賞はありません。<br>下のカレンダーから今後のレースをチェック！</div>
    `;
    return;
  }

  // グレードclass取得
  function twGradeClass(grade) {
    if (grade.includes('Ⅰ') && grade.includes('J')) return 'jg';
    if (grade.includes('Ⅰ')) return 'g1';
    if (grade.includes('Ⅱ')) return 'g2';
    if (grade.includes('Ⅲ')) return 'g3';
    return 'g3';
  }

  // 日付ソート
  races.sort((a, b) => a.date.localeCompare(b.date));

  let racesHtml = '';
  races.forEach(r => {
    const cls = twGradeClass(r.grade);
    const isG1 = cls === 'g1' || cls === 'jg';
    const d = new Date(r.date);
    const md = (d.getMonth()+1) + '/' + d.getDate();
    const w = ['日','月','火','水','木','金','土'][d.getDay()];

    racesHtml += `
      <div class="tw-race ${isG1 ? 'tw-g1' : ''}">
        <div class="tw-race-date">${md}<small>${w}曜</small></div>
        <div class="tw-race-info">
          <div class="tw-race-name">${r.name}</div>
          <div class="tw-race-course">${r.course}競馬場</div>
        </div>
        <div class="tw-race-grade tw-grade-${cls}">${r.grade}</div>
      </div>
    `;
  });

  pickContainer.innerHTML = `
    <div class="this-week-header">
      <span class="this-week-badge">★ ${label === '今週末' ? 'THIS WEEK' : 'NEXT WEEK'}</span>
      <span class="this-week-label">${label}の重賞 ${races.length}レース</span>
    </div>
    <div class="this-week-races">${racesHtml}</div>
  `;
})();

// ===== 月別カレンダー生成 =====
// 月別グルーピング
function groupByMonth(races) {
  const groups = {};
  races.forEach(r => {
    const month = parseInt(r.date.split('-')[1], 10);
    if (!groups[month]) groups[month] = [];
    groups[month].push(r);
  });
  return groups;
}

// グレードクラス取得
function gradeClass(grade) {
  if (grade.includes('Ⅰ') && !grade.includes('J')) return 'g1';
  if (grade.includes('Ⅰ') && grade.includes('J')) return 'jg';
  if (grade.includes('Ⅱ')) return 'g2';
  if (grade.includes('Ⅲ')) return 'g3';
  return 'g3';
}

const monthLabels = {
  1:'JANUARY',2:'FEBRUARY',3:'MARCH',4:'APRIL',5:'MAY',6:'JUNE',
  7:'JULY',8:'AUGUST',9:'SEPTEMBER',10:'OCTOBER',11:'NOVEMBER',12:'DECEMBER'
};

const grouped = groupByMonth(RACE_DATA);
const container = document.getElementById('schedule-container');

for (let m = 1; m <= 12; m++) {
  const races = grouped[m] || [];
  if (races.length === 0) continue;

  const section = document.createElement('section');
  section.className = 'month-section';
  section.id = 'm' + m;

  let html = `
    <div class="month-header">
      <div class="month-num">${m}<em>月</em></div>
      <div class="month-label">${monthLabels[m]}</div>
      <div class="month-count">${races.length} RACES</div>
    </div>
    <div class="race-list">
  `;

  races.forEach(r => {
    const cls = gradeClass(r.grade);
    const isG1 = cls === 'g1' || cls === 'jg';
    const dateJa = formatDateJa(r.date);
    html += `
      <div class="race-card ${cls}">
        <div class="race-date">${dateJa}</div>
        <div class="race-info">
          <div class="race-name ${isG1 ? 'g1-name' : ''}">${r.name}</div>
          <div class="race-course">${r.course}競馬場</div>
        </div>
        <div class="race-grade grade-${cls}">${r.grade}</div>
      </div>
    `;
  });

  html += '</div>';
  section.innerHTML = html;
  container.appendChild(section);
}
</script>
