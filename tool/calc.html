</style>

function getHint(){
  const m=curMode,bt=curBet;
  if(bt&&bt.win5){
    const counts=slots.map((s,i)=>`R${i+1}:${s.length}й ӯ`).join('гҖҖ');
    const missing=slots.filter(s=>!s.length).length;
    if(missing) return `${missing}гғ¬гғјгӮ№жңӘйҒёжҠһгҖҖ${counts}`;
    return `йҒёжҠһжёҲгҒҝгҖҖ${counts}`;
  }
  if(!m) return bt.id==='tan'||bt.id==='fuku'?'1й ӯгӮ’йҒёжҠһ':'';
  if(m.box) return `${m.need}й ӯд»ҘдёҠгӮ’йҒёжҠһпјҲгғңгғғгӮҜгӮ№пјү`;
  if(m.nagashi){ const fc=m.nagashi,arr=slots[0]||[]; if(arr.length<fc) return `и»ёгӮ’${fc}й ӯйҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„`; return `зӣёжүӢ${Math.max(0,arr.length-fc)}й ӯйҒёжҠһдёӯ`; }
  if(m.formation){ const labels=m.labels||['A','B','C']; const missing=[]; for(let i=0;i<m.slots;i++) if(!(slots[i]||[]).length) missing.push(labels[i]); if(missing.length) return `${missing.join('гғ»')}гӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„`; return `${labels[activeSlot]}гӮ’йҒёжҠһдёӯ`; }
  return '';
}
function renderGrid(){
  const hc=parseInt(document.getElementById('horseCount').value)||16;

  const scls=['s1','s2','s3'];
  const swcls=['sw1','sw2','sw3','sw4','sw5'];
  // slot colors: bg, border, text
  const SC=[
    {bg:'#0c2040',bd:'#4a9eff',tx:'#4a9eff'},
    {bg:'#0a2818',bd:'#4ecb71',tx:'#4ecb71'},
    {bg:'#28180a',bd:'#f5a623',tx:'#f5a623'},
  ];

  // WIN5: show current leg's selected horses
  if(bt.win5){
    const legArr=slots[activeSlot]||[];
    for(let i=1;i<=hc;i++){

    }
    document.getElementById('hint').textContent=getHint();
    return;
  }

  for(let i=1;i<=hc;i++){
    const b=document.createElement('button'); b.className='horse-btn';

    if(isTF||!m){
      const inSlot=(slots[0]||[]).includes(i);
      if(inSlot) b.classList.add('s1');

      const inSlot=(slots[0]||[]).includes(i);
      if(inSlot) b.classList.add('s1');
      b.textContent=i;
    } else if(m.nagashi){
      const arr=slots[0]||[],idx=arr.indexOf(i),fc=m.nagashi;
      if(idx!==-1) b.classList.add(idx<fc?'s1':'s3');
      b.textContent=i;
    } else if(m.formation){
      // collect all slots this horse belongs to
      const inSlots=[];
      for(let si=0;si<m.slots;si++) if((slots[si]||[]).includes(i)) inSlots.push(si);

      if(inSlots.length===0){
        b.textContent=i;
      } else if(inSlots.length===1){
        b.classList.add(scls[inSlots[0]]);
        b.textContent=i;
      } else {
        // multiple slots: draw diagonal split background
        const c0=SC[inSlots[0]], c1=SC[inSlots[1]];
        // top-left triangle = first slot color, bottom-right = second
        b.style.background=`linear-gradient(135deg, ${c0.bg} 50%, ${c1.bg} 50%)`;
        b.style.borderColor=c0.bd;
        // if 3 slots, add third color as bottom strip (rare but handle gracefully)
        if(inSlots.length===3){
          const c2=SC[inSlots[2]];
          b.style.background=`linear-gradient(135deg, ${c0.bg} 33%, ${c1.bg} 33% 66%, ${c2.bg} 66%)`;
        }
        // number with text-shadow to stay visible on both halves
        const span=document.createElement('span');
        span.className='btn-num';
        span.textContent=i;
        span.style.color='#fff';
        span.style.textShadow=`0 0 4px #000, 0 0 4px #000`;
        b.appendChild(span);

        // show both border colors as a two-tone border via outline trick
        b.style.boxShadow=`0 0 0 1.5px ${c1.bd}, inset 0 0 0 1.5px ${c0.bd}`;
        b.style.border='none';

        b.onclick=()=>toggleHorse(i); grid.appendChild(b);
        continue;
      }
    }

    b.onclick=()=>toggleHorse(i); grid.appendChild(b);
  }
  document.getElementById('hint').textContent=getHint();
}
function toggleHorse(n){
  const m=curMode,bt=curBet,isTF=bt.id==='tan'||bt.id==='fuku';
  if(bt.win5){ const arr=slots[activeSlot]||[]; const idx=arr.indexOf(n); if(idx!==-1) arr.splice(idx,1); else arr.push(n); slots[activeSlot]=arr; renderGrid(); updateBadge(); updateHeroPts(); return; }
  if(isTF||!m){ const arr=slots[0]||[]; if(isTF){ slots=[[arr.includes(n)?null:n].filter(Boolean)]; } else{ arr.includes(n)?arr.splice(arr.indexOf(n),1):arr.push(n);slots=[arr]; } }
  else if(m.box){ const arr=slots[0]||[]; arr.includes(n)?arr.splice(arr.indexOf(n),1):arr.push(n); slots=[arr]; }
  else if(m.nagashi){ const arr=[...(slots[0]||[])],fc=m.nagashi,idx=arr.indexOf(n); if(idx!==-1){ arr.splice(idx,1); } else if(arr.length<fc){ arr.unshift(n); } else{ arr.push(n); } slots=[arr]; }
  else if(m.formation){ const si=activeSlot; if(!slots[si]) slots[si]=[]; const arr=slots[si],idx=arr.indexOf(n); if(idx!==-1){ arr.splice(idx,1); } else{ arr.push(n); } }
  renderGrid(); updateBadge(); updateHeroPts();
}
function generateTickets(){
  const m=curMode,bt=curBet,isTF=bt.id==='tan'||bt.id==='fuku';
  // WIN5: product of all 5 legs
  if(bt.win5){
    let result=[[]];
    for(let i=0;i<5;i++){
      const leg=(slots[i]||[]).slice().sort((a,b)=>a-b);
      if(!leg.length) return [];
      const next=[];
      result.forEach(r=>leg.forEach(h=>next.push([...r,h])));
      result=next;
    }
    return result;
  }
  if(isTF||!m){ const arr=slots[0]||[]; return arr.length===1?[[arr[0]]]:[];}
  if(m.box){
    const s=[...(slots[0]||[])].sort((a,b)=>a-b); if(s.length<m.need) return [];
    const res=[];
    if(m.need===2){ for(let i=0;i<s.length;i++) for(let j=i+1;j<s.length;j++) res.push([s[i],s[j]]); }
    else{ for(let i=0;i<s.length;i++) for(let j=i+1;j<s.length;j++) for(let k=j+1;k<s.length;k++) res.push([s[i],s[j],s[k]]); }
    if(m.ordered){ const r2=[]; if(m.need===2) res.forEach(([a,b])=>{r2.push([a,b]);r2.push([b,a]);}); else res.forEach(([a,b,c])=>{[[a,b,c],[a,c,b],[b,a,c],[b,c,a],[c,a,b],[c,b,a]].forEach(p=>r2.push(p));}); return r2; }
    return res;
  }
  if(m.nagashi){
    const arr=slots[0]||[],fc=m.nagashi; if(arr.length<=fc) return [];
    const fixed=arr.slice(0,fc),aite=arr.slice(fc); const res=[];
    if(fc===1){ aite.forEach(a=>{ res.push(m.ordered?[fixed[0],a]:[Math.min(fixed[0],a),Math.max(fixed[0],a)]); }); }
    else{ aite.forEach(a=>{ const t=[...fixed,a];res.push(m.ordered?t:t.sort((x,y)=>x-y)); }); }
    return res;
  }
  if(m.formation){
    const sls=slots.map(s=>[...(s||[])]); for(let i=0;i<m.slots;i++) if(!sls[i]||!sls[i].length) return [];
    const seen=new Set(),res=[];
    if(m.slots===2){ sls[0].forEach(a=>sls[1].forEach(b=>{ if(a===b) return; const arr=m.ordered?[a,b]:[Math.min(a,b),Math.max(a,b)]; const key=arr.join('-'); if(!seen.has(key)){seen.add(key);res.push(arr);} })); }
    else{ sls[0].forEach(a=>sls[1].forEach(b=>sls[2].forEach(c=>{ if(a===b||b===c||a===c) return; const arr=m.ordered?[a,b,c]:[a,b,c].sort((x,y)=>x-y); const key=arr.join('-'); if(!seen.has(key)){seen.add(key);res.push(arr);} }))); }
    return res;
  }
  return [];
}

  const amtLabel = amt===100 ? '100еҶҶиіје…ҘжҷӮ' : `${amt.toLocaleString()}еҶҶиіје…ҘжҷӮ`;
  let html = `<div class="nk-summary">
    <div class="nk-sum-card"><div class="nk-sum-label">иІ·зӣ®зӮ№ж•°</div><div class="nk-sum-val">${totalPts}<span class="nk-sum-unit">зӮ№</span></div></div>
    <div class="nk-sum-card"><div class="nk-sum-label">${amtLabel}</div><div class="nk-sum-val">${amount100}<span class="nk-sum-unit">еҶҶ</span></div></div>
  </div>`;

  // Main format box вҖ” the netkeiba-style formula
  html += `<div class="nk-format-box">`;
  html += `<div class="nk-format-title">иІ·зӣ®гғ•гӮ©гғјгғһгғғгғҲ</div>`;
  html += `<div class="nk-formula">`;

  if(isSingle){
    // tan/fuku: single horse
    tickets.forEach(([h])=>{
      html+=`<span class="nk-horse-badge c1">${h}</span>`;
    });
  } else if(isBox){
    // BOX: в‘ в‘Ўв‘ўв‘Јв‘Ө (all same color, no sep)
    const horses=[...(slots[0]||[])].sort((a,b)=>a-b);
    html+=`<div class="nk-slot">`;
    horses.forEach(h=>{ html+=`<span class="nk-horse-badge cbox">${h}</span>`; });
    html+=`</div>`;
    html+=`<div style="font-size:11px;color:rgba(255,255,255,.4);margin-left:4px">${horses.length}й ӯгғңгғғгӮҜгӮ№</div>`;
  } else if(isNag){
    // NAGASHI: в‘ в‘ЎпјҚв‘ўв‘Јв‘Өв‘Ҙ  (и»ё sep зӣёжүӢ)
    const fc=m.nagashi;
    const arr=slots[0]||[];
    const fixed=arr.slice(0,fc), aite=arr.slice(fc);
    const fixCls=['c1','c2'];
    html+=`<div class="nk-slot">`;
    fixed.forEach((h,i)=>{ html+=`<span class="nk-horse-badge ${fixCls[i]}">${h}</span>`; });
    html+=`</div>`;
    html+=sep;
    html+=`<div class="nk-slot">`;
    aite.sort((a,b)=>a-b).forEach(h=>{ html+=`<span class="nk-horse-badge c3">${h}</span>`; });
    html+=`</div>`;
  } else if(isForm){
    // FORMATION: column labels instead of arrows
    const colors=['c1','c2','c3'];
    const colLabels=['1еҲ—зӣ®','2еҲ—зӣ®','3еҲ—зӣ®'];
    for(let si=0;si<m.slots;si++){
      if(si>0) html+=`<span class="nk-sep" style="font-size:13px;opacity:.5">пјҸ</span>`;
      html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px">`;
      html+=`<span style="font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.04em">${colLabels[si]}</span>`;
      html+=`<div class="nk-slot">`;
      (slots[si]||[]).sort((a,b)=>a-b).forEach(h=>{ html+=`<span class="nk-horse-badge ${colors[si]}">${h}</span>`; });
      html+=`</div></div>`;
    }
  }

  html+=`</div>`; // nk-formula

  // Circled notation string (like в‘ -в‘Ўв‘ў-в‘ўв‘Јв‘Ө)
  let formulaStr = '';
  if(isSingle){
    formulaStr = tickets.map(([h])=>cn(h)).join('');
  } else if(isBox){
    const horses=[...(slots[0]||[])].sort((a,b)=>a-b);
    formulaStr = horses.map(cn).join('');
  } else if(isNag){
    const fc=m.nagashi; const arr=slots[0]||[];
    const fixed=arr.slice(0,fc),aite=arr.slice(fc).sort((a,b)=>a-b);
    const fsep=isOrd?'вҶ’':'пјҚ';
    formulaStr=fixed.map(cn).join('')+fsep+aite.map(cn).join('');
  } else if(isForm){
    const colLbls=['1еҲ—зӣ®','2еҲ—зӣ®','3еҲ—зӣ®'];
    formulaStr=slots.map((sl,si)=>colLbls[si]+':'+[...(sl||[])].sort((a,b)=>a-b).map(cn).join('')).join('гҖҖ');
  }
  html+=`<div style="font-size:12px;color:rgba(255,255,255,.35);margin-top:6px;letter-spacing:.04em">${formulaStr}</div>`;
  html+=`</div>`; // nk-format-box

  // Expand toggle + individual tickets
  html+=`<span class="nk-expand-toggle" onclick="toggleExpand(this)">в–¶ е…ЁиІ·зӣ®гӮ’еұ•й–ӢпјҲ${totalPts}зӮ№пјү</span>`;
  html+=`<div class="nk-tickets-wrap" id="nkTickets">`;
  html+=`<div class="nk-tickets-grid" style="margin-top:8px">`;
  const MAX=100;
  const shown=tickets.slice(0,MAX);
  shown.forEach((hs,i)=>{
    const pillsHtml=hs.map((h,hi)=>{
      let cls='pb';
      if(isBox) cls='pb';
      else if(isNag) cls=hi<m.nagashi?'p1':'p3';
      else if(isForm) cls=['p1','p2','p3'][hi]||'pb';
      else if(isOrd) cls=['p1','p2','p3'][hi]||'pb';
      const s=hi<hs.length-1?`<span class="sm-dash">вҖ“</span>`:'';
      return `<span class="sm-pill ${cls}">${h}</span>${s}`;
    }).join('');
    html+=`<div class="nk-ticket"><span class="nk-t-idx">${i+1}</span><div class="nk-t-pills">${pillsHtml}</div></div>`;
  });
  html+=`</div>`;
  if(totalPts>MAX) html+=`<div class="more-note">вҖҰд»– ${totalPts-MAX} зӮ№</div>`;
  html+=`</div>`; // nk-tickets-wrap

  return html;
}

function toggleExpand(el){
  const wrap=document.getElementById('nkTickets');
  const open=wrap.classList.toggle('open');
  el.textContent=(open?'в–ј е…ЁиІ·зӣ®гӮ’жҠҳгӮҠгҒҹгҒҹгӮҖ':'в–¶ е…ЁиІ·зӣ®гӮ’еұ•й–ӢпјҲ'+generateTickets().length+'зӮ№пјү');
}

function getBetAmount(){ return parseInt(document.getElementById('betAmount').value)||100; }
function updateHeroPts(){
  const n=generateTickets().length;
  const amt=getBetAmount();
  const total=(n*amt).toLocaleString();
  document.getElementById('heroPts').textContent=n+' зӮ№';
  document.getElementById('ptBadge').textContent=n+'зӮ№ пјҸ '+total+'еҶҶ';
}
function updateBadge(){
  const n=generateTickets().length;
  const amt=getBetAmount();
  const total=(n*amt).toLocaleString();
  document.getElementById('ptBadge').textContent=n+'зӮ№ пјҸ '+total+'еҶҶ';
  document.getElementById('heroPts').textContent=n+' зӮ№';
}

function openPopup(){
  const bt=curBet, m=curMode;
  const n=document.getElementById('heroPts').textContent.replace('зӮ№','');
  const modeLabel = m ? (m.box ? 'гғңгғғгӮҜгӮ№' : (m.format==='formation' ? 'гғ•гӮ©гғјгғЎгғјгӮ·гғ§гғі' : 'гҒӘгҒҢгҒ—')) : '';
  const tickets=generateTickets();

  // 1. гҒҫгҒҡз”»еғҸгӮ’гӮ»гғғгғҲгҒҷгӮӢпјҲгҒ“гҒ®жҷӮгҒҜгҒҫгҒ гғқгғғгғ—гӮўгғғгғ—гҒҜйқһиЎЁзӨәпјү
  document.getElementById('popHeroChar').src = IMGS[bt.id];
  
  // 2. гҒқгҒ®д»–гҒ®гғҶгӮӯгӮ№гғҲгҒӘгҒ©гӮ’гӮ»гғғгғҲ
  document.getElementById('popBetName').textContent=bt.label;
  document.getElementById('popBetName').style.textShadow=`0 0 20px ${bt.glow}55`;
  document.getElementById('popBetDesc').textContent=bt.desc;
  document.getElementById('popModeTag').textContent=modeLabel;
  document.getElementById('popPtsNum').textContent=n;
  document.getElementById('popPtsNum').style.color=bt.accent;
  document.getElementById('popPtsNum').style.textShadow=`0 0 30px ${bt.glow}aa`;
  document.getElementById('popupBody').innerHTML=buildNetkeibaHTML(bt,m,tickets);

  // 3. гҒ»гӮ“гҒ®е°‘гҒ—гҒ гҒ‘пјҲ0.01з§’пјүеҫ…гҒЈгҒҰгҒӢгӮүиЎЁзӨәгӮҜгғ©гӮ№гӮ’иҝҪеҠ гҒҷгӮӢ
  // гҒ“гӮҢгҒ«гӮҲгӮҠгҖҒз”»еғҸгҒҢеҲҮгӮҠжӣҝгӮҸгӮӢгҖҢжә–еӮҷгҖҚгҒҢж•ҙгҒЈгҒҰгҒӢгӮүгӮўгғӢгғЎгғјгӮ·гғ§гғігҒҢе§ӢгҒҫгӮҠгҒҫгҒҷ
  setTimeout(() => {
    document.getElementById('popup').classList.add('open');
  }, 10);
}
function closePopup(){ document.getElementById('popup').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePopup(); });

function doCopy(fromPopup){
  const bt=curBet,m=curMode;
  const tickets=generateTickets(); if(!tickets.length) return;
  const isOrd=m&&m.ordered&&!m.box;
  const lines=tickets.map((h,i)=>`${i+1}. ${h.join(isOrd?'вҶ’':'-')}`);
  const text=`гҖҗ${bt.label}гҖ‘${tickets.length}зӮ№\n`+lines.join('\n');
  navigator.clipboard.writeText(text).catch(()=>{});
  const btn=document.getElementById(fromPopup?'popCopyBtn':'copyBtn');
  const orig=btn.textContent; btn.textContent='гӮігғ”гғјгҒ—гҒҫгҒ—гҒҹпјҒ';
  setTimeout(()=>btn.textContent=orig,1500);
}
function clearAll(){ slots=initSlots(); activeSlot=0; renderAll(); }
document.getElementById('horseCount').addEventListener('change',()=>{ slots=initSlots(); renderAll(); });
document.getElementById('betAmount').addEventListener('change',()=>{ updateBadge(); });
init();
    // --- гҒ“гҒ“гҒӢгӮүиҝҪеҠ  ---
// гғҡгғјгӮёгӮ’й–ӢгҒ„гҒҹзһ¬й–“гҒ«е…ЁгҒҰгҒ®гӮӯгғЈгғ©гӮҜгӮҝгғјз”»еғҸгӮ’гғҗгғғгӮҜгӮ°гғ©гӮҰгғігғүгҒ§иӘӯгҒҝиҫјгҒҝгҒҫгҒҷ
window.addEventListener('load', () => {
  Object.values(IMGS).forEach(src => {
    const img = new Image();
    img.src = src;
  });
});
// --- гҒ“гҒ“гҒҫгҒ§иҝҪеҠ  ---
</script>
