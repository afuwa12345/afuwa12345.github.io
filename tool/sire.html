<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AFRO HORSE 種牡馬ランキング</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --red:#FF1A1A; --black:#080808; --white:#FFFFFF; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body { background:var(--black); color:var(--white); font-family:'Noto Sans JP',sans-serif; overflow-x:hidden; min-height:100vh; }

.nav { position:fixed; top:0; left:0; right:0; z-index:200; padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; background:rgba(8,8,8,0.92); backdrop-filter:blur(14px); border-bottom:1px solid rgba(255,26,26,0.15); }
.nav-logo { font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:3px; color:var(--white); text-decoration:none; }
.nav-logo em { color:var(--red); font-style:normal; }
.nav-back { font-family:'Bebas Neue',cursive; font-size:14px; letter-spacing:2px; color:rgba(255,255,255,0.4); text-decoration:none; transition:color 0.2s; }
.nav-back:active { color:var(--red); }

.ticker-outer { overflow:hidden; background:var(--red); padding:8px 0; margin-top:56px; }
.ticker-track { display:flex; gap:32px; white-space:nowrap; animation:ticker 20s linear infinite; }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.ticker-item { font-family:'Bebas Neue',cursive; font-size:13px; letter-spacing:2px; color:#fff; flex-shrink:0; }

.page-header { padding:36px 24px 28px; text-align:center; position:relative; overflow:hidden; }
.page-header::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 50%, rgba(255,26,26,0.1) 0%, transparent 70%); pointer-events:none; }
.scanlines { position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); pointer-events:none; }
.header-inner { position:relative; z-index:1; display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; }
.header-text { text-align:center; }
.page-eyebrow { font-family:'Bebas Neue',cursive; font-size:12px; letter-spacing:4px; color:var(--red); margin-bottom:6px; }
.page-title { font-family:'Bebas Neue',cursive; font-size:clamp(32px,8vw,52px); letter-spacing:4px; line-height:1.1; margin-bottom:8px; text-shadow:0 0 30px rgba(255,26,26,0.3); }
.page-title em { color:var(--red); font-style:normal; }
.page-desc { font-size:12px; color:rgba(255,255,255,0.5); line-height:1.8; }
.header-chara { width:clamp(130px,30vw,200px); flex-shrink:0; filter:drop-shadow(0 0 20px rgba(255,26,26,0.3)); animation:charaFloat 3s ease-in-out infinite; }
@keyframes charaFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.selector-wrap { padding:0 16px 14px; max-width:640px; margin:0 auto; }
.sel-section { background:rgba(255,255,255,0.03); border:1px solid rgba(255,26,26,0.15); border-radius:12px; padding:16px; margin-bottom:10px; }
.sel-label { font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:3px; color:var(--red); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.sel-label::after { content:''; flex:1; height:1px; background:rgba(255,26,26,0.2); }
.chip-grid-5 { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; }
.chip-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.dist-grid { display:flex; flex-wrap:wrap; gap:7px; }
.chip { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:9px 4px; text-align:center; cursor:pointer; font-size:13px; color:rgba(255,255,255,0.6); transition:all 0.15s; user-select:none; }
.chip:active { transform:scale(0.96); }
.chip.active { background:rgba(255,26,26,0.15); border-color:var(--red); color:var(--red); font-weight:700; box-shadow:0 0 12px rgba(255,26,26,0.15); }
.chip.surface { padding:13px; font-size:15px; font-weight:700; }
.chip.dist-chip { padding:9px 14px; font-size:13px; min-width:72px; }
.course-char { border-left:2px solid var(--red); border-radius:0 6px 6px 0; padding:8px 12px; font-size:11px; color:rgba(255,255,255,0.5); margin-top:10px; line-height:1.7; background:rgba(255,26,26,0.05); display:none; }
#surfaceSection { display:none; }
#distSection { display:none; margin-top:10px; }
#babaSection { display:none; margin-top:10px; }
.chip-grid-baba { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; }

.search-wrap { padding:0 16px 22px; max-width:640px; margin:0 auto; }
.search-btn { width:100%; padding:17px; background:linear-gradient(135deg,#FF1A1A 0%,#cc0000 100%); border:none; border-radius:10px; color:var(--white); font-family:'Bebas Neue',cursive; font-size:20px; letter-spacing:4px; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(255,26,26,0.3); }
.search-btn:active:not(:disabled) { transform:scale(0.98); }
.search-btn:disabled { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.2); cursor:not-allowed; box-shadow:none; }

.result-wrap { padding:0 16px 40px; max-width:640px; margin:0 auto; animation:fadeUp 0.4s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.result-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.result-title { font-family:'Bebas Neue',cursive; font-size:14px; letter-spacing:3px; color:var(--red); white-space:nowrap; }
.result-line { flex:1; height:1px; background:rgba(255,26,26,0.2); }
.sire-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:15px; margin-bottom:9px; position:relative; overflow:hidden; }
.sire-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,26,26,0.5),transparent); }
.sire-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.rank-badge { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',cursive; font-size:16px; flex-shrink:0; }
.rank-1 { background:linear-gradient(135deg,#FFD700,#FFA500); color:#080808; box-shadow:0 0 12px rgba(255,215,0,0.35); }
.rank-2 { background:linear-gradient(135deg,#C0C0C0,#909090); color:#080808; }
.rank-3 { background:linear-gradient(135deg,#CD7F32,#8B5A00); color:#fff; }
.rank-n { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); }
.sire-name { font-size:18px; font-weight:900; color:var(--white); flex:1; line-height:1.2; }
.sire-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.stat-item { background:rgba(255,255,255,0.04); border-radius:6px; padding:8px 6px; text-align:center; }
.stat-label { font-size:9px; color:rgba(255,255,255,0.4); letter-spacing:0.1em; margin-bottom:4px; }
.stat-value { font-family:'Bebas Neue',cursive; font-size:18px; color:var(--white); letter-spacing:1px; }
.stat-value.hl { color:var(--red); }
.sire-runs { text-align:right; font-size:10px; color:rgba(255,255,255,0.3); margin-top:7px; }
.spinner { width:28px; height:28px; border:2px solid rgba(255,26,26,0.2); border-top-color:var(--red); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 10px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-msg { text-align:center; padding:24px; font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:0.1em; }
.no-data { text-align:center; padding:36px 20px; color:rgba(255,255,255,0.3); font-size:13px; line-height:1.8; }
.note { font-size:10px; color:rgba(255,255,255,0.2); text-align:center; margin-top:14px; line-height:1.8; padding:0 8px; }

footer { background:#050505; border-top:1px solid rgba(255,26,26,0.15); padding:32px 24px 40px; text-align:center; }
.footer-logo { font-family:'Bebas Neue',cursive; font-size:28px; letter-spacing:4px; margin-bottom:6px; }
.footer-logo em { color:var(--red); font-style:normal; }
.footer-copy { font-size:11px; color:rgba(255,255,255,0.2); margin-top:14px; }
.back-link { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,0.4); font-size:12px; text-decoration:none; margin-bottom:14px; }
.back-link:active { color:var(--red); }
</style>
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-logo">AFRO<em>Horse</em></div>
  <a href="../index.html" class="nav-back">← HOME</a>
</nav>



<div class="page-header" style="margin-top:52px;">
  <div class="scanlines"></div>
  <div class="header-inner">
    <div class="header-text">
      <p class="page-eyebrow">Data-Driven</p>
      <h1 class="page-title">AFRO HORSE<br><em>種牡馬ランキング</em></h1>
      <p class="page-desc">JRA実績データからアフロ馬が独自で算出した<br>コース別・距離別の種牡馬ランキング<br>参考程度で使ってください</p>
    </div>
    <img class="header-chara" src="../images/afuwa2.png" alt="アフワ">
  </div>
</div>

<div class="selector-wrap">
  <div class="sel-section">
    <div class="sel-label">競馬場を選択</div>
    <div class="chip-grid-5" id="courseGrid"></div>
    <div class="course-char" id="courseChar"></div>
  </div>
  <div class="sel-section" id="surfaceSection">
    <div class="sel-label">馬場を選択</div>
    <div class="chip-grid-2" id="surfaceGrid"></div>
    <div id="distSection">
      <div class="sel-label" style="margin-top:12px;">距離を選択</div>
      <div class="dist-grid" id="distGrid"></div>
    </div>
    <div id="babaSection">
      <div class="sel-label" style="margin-top:12px;">馬場状態を選択</div>
      <div class="chip-grid-baba" id="babaGrid"></div>
    </div>
  </div>
</div>

<div class="search-wrap">
  <button class="search-btn" id="searchBtn" disabled onclick="showRanking()">
    ▶ ランキングを見る
  </button>
</div>

<div id="resultArea"></div>

<footer>
  <a href="index.html" class="back-link">← HOMEに戻る</a>
  <div class="footer-logo">AFRO<em>Horse</em></div>
  <p class="footer-copy">© 2025 AFRO Horse. All rights reserved.</p>
</footer>

<script>
const COURSES = ["東京","中山","阪神","京都","中京","小倉","函館","札幌","福島","新潟"];
const COURSE_CHARS = {
  東京:"直線525m・広いコース。末脚・瞬発力が問われる",
  中山:"小回り・アップダウンあり。パワーとスタミナが必要",
  阪神:"内回り・外回りあり。差し馬も台頭しやすい",
  京都:"淀の坂あり。先行有利で持続力が重要",
  中京:"改修後は直線長く差し有利。瞬発力が問われる",
  小倉:"直線293m・小回り。先行・逃げが断然有利",
  函館:"小回り・洋芝。スタミナと洋芝適性が重要",
  札幌:"平坦・洋芝。先行型が有利",
  福島:"直線292m・小回り。先行有利",
  新潟:"直線658m。差し・追込みが決まりやすい",
};
const DISTANCES = {
  芝:[
    {label:"短距離（〜1400m）",value:"短距離"},
    {label:"マイル（〜1800m）",value:"マイル"},
    {label:"中距離（〜2200m）",value:"中距離"},
    {label:"長距離（2200m〜）",value:"長距離"},
  ],
  ダ:[
    {label:"短距離（〜1400m）",value:"短距離"},
    {label:"マイル（〜1800m）",value:"マイル"},
    {label:"中距離（〜2200m）",value:"中距離"},
    {label:"長距離（2200m〜）",value:"長距離"},
  ],
};

let jsonData = null;
let state = {course:"", surface:"", distance:"", baba:""};

window.addEventListener("DOMContentLoaded", () => {
  buildCourseChips();
  fetch("result.json")
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => { jsonData = data; })
    .catch(() => {});
});

function checkReady() {
  document.getElementById("searchBtn").disabled =
    !(state.course && state.surface && state.distance && state.baba);
}

function buildCourseChips() {
  const grid = document.getElementById("courseGrid");
  COURSES.forEach(c => {
    const div = document.createElement("div");
    div.className = "chip";
    div.textContent = c;
    div.addEventListener("click", () => {
      state.course = c;
      state.surface = "";
      state.distance = "";
      grid.querySelectorAll(".chip").forEach(el => el.classList.remove("active"));
      div.classList.add("active");
      const el = document.getElementById("courseChar");
      el.textContent = "📍 " + (COURSE_CHARS[c] || "");
      el.style.display = "block";
      buildSurfaceChips(c);
      document.getElementById("distSection").style.display = "none";
      document.getElementById("resultArea").innerHTML = "";
      checkReady();
    });
    grid.appendChild(div);
  });
  document.getElementById("surfaceSection").style.display = "none";
}

function buildSurfaceChips(course) {
  const grid = document.getElementById("surfaceGrid");
  grid.innerHTML = "";
  ["芝","ダ"].forEach(s => {
    const div = document.createElement("div");
    div.className = "chip surface";
    div.textContent = s === "芝" ? "🌿 芝" : "🟤 ダート";
    div.addEventListener("click", () => {
      state.surface = s;
      state.distance = "";
      state.baba = "";
      grid.querySelectorAll(".chip").forEach(el => el.classList.remove("active"));
      div.classList.add("active");
      buildDistChips(course, s);
      document.getElementById("babaSection").style.display = "none";
      document.getElementById("resultArea").innerHTML = "";
      checkReady();
    });
    grid.appendChild(div);
  });
  document.getElementById("surfaceSection").style.display = "block";
}

function buildDistChips(course, surface) {
  const grid = document.getElementById("distGrid");
  grid.innerHTML = "";
  let dists;
  if (jsonData && jsonData[course] && jsonData[course][surface]) {
    dists = Object.keys(jsonData[course][surface]).sort((a,b) => parseInt(a) - parseInt(b));
  } else {
    const defaults = {
      東京:{ 芝:["1400m","1600m","1800m","2000m","2400m","2500m"], ダ:["1300m","1400m","1600m","2100m"] },
      中山:{ 芝:["1200m","1600m","1800m","2000m","2200m","2500m"], ダ:["1200m","1800m"] },
      阪神:{ 芝:["1200m","1400m","1600m","1800m","2000m","2200m","2400m"], ダ:["1200m","1400m","1800m","2000m"] },
      京都:{ 芝:["1200m","1400m","1600m","1800m","2000m","2200m","2400m"], ダ:["1200m","1400m","1800m","1900m"] },
      中京:{ 芝:["1200m","1400m","1600m","2000m"], ダ:["1200m","1400m","1800m","1900m"] },
      小倉:{ 芝:["1200m","1700m","1800m","2000m","2600m"], ダ:["1000m","1700m"] },
      函館:{ 芝:["1000m","1200m","1800m","2000m","2600m"], ダ:["1000m","1700m"] },
      札幌:{ 芝:["1200m","1500m","1800m","2000m","2600m"], ダ:["1000m","1700m"] },
      福島:{ 芝:["1200m","1800m","2000m","2600m"], ダ:["1150m","1700m"] },
      新潟:{ 芝:["1000m","1200m","1400m","1600m","1800m","2000m","2200m"], ダ:["1200m","1800m"] },
    };
    dists = (defaults[course] && defaults[course][surface]) || [];
  }
  dists.forEach(d => {
    const div = document.createElement("div");
    div.className = "chip dist-chip";
    div.textContent = d;
    div.addEventListener("click", () => {
      state.distance = d;
      state.baba = "";
      grid.querySelectorAll(".chip").forEach(el => el.classList.remove("active"));
      div.classList.add("active");
      buildBabaChips(course, surface, d);
      document.getElementById("resultArea").innerHTML = "";
      checkReady();
    });
    grid.appendChild(div);
  });
  document.getElementById("distSection").style.display = "block";
}


function buildBabaChips(course, surface, dist) {
  const grid = document.getElementById("babaGrid");
  grid.innerHTML = "";
  const allOptions = ["全天候", "良", "稍重", "重", "不良"];
  // JSONから実際にあるものだけ表示
  let available = allOptions.filter(b => {
    if (!jsonData) return true;
    return jsonData[course]?.[surface]?.[dist]?.[b];
  });
  if (available.length === 0) available = allOptions;
  available.forEach(b => {
    const div = document.createElement("div");
    div.className = "chip";
    div.textContent = b === "全天候" ? "🌤 全天候" :
                      b === "良"   ? "☀️ 良" :
                      b === "稍重" ? "🌦 稍重" :
                      b === "重"   ? "🌧 重" : "⛈ 不良";
    div.style.fontSize = "12px";
    div.addEventListener("click", () => {
      state.baba = b;
      grid.querySelectorAll(".chip").forEach(el => el.classList.remove("active"));
      div.classList.add("active");
      checkReady();
    });
    grid.appendChild(div);
  });
  document.getElementById("babaSection").style.display = "block";
}

function showRanking() {
  const resultArea = document.getElementById("resultArea");
  if (!jsonData) {
    resultArea.innerHTML = '<div class="loading-msg"><div class="spinner"></div>データを読み込み中…<br><span style="font-size:11px;margin-top:6px;display:block;color:rgba(255,255,255,0.3)">result.jsonをsire.htmlと同じフォルダに置いてください</span></div>';
    fetch("result.json").then(r=>r.json()).then(data=>{jsonData=data;showRanking();}).catch(()=>{
      resultArea.innerHTML='<div class="no-data">⚠️ result.jsonが読み込めません</div>';
    });
    return;
  }
  try {
    const sires = jsonData[state.course]?.[state.surface]?.[state.distance]?.[state.baba];
    if (!sires || sires.length === 0) {
      resultArea.innerHTML='<div class="no-data">🏇<br>該当データがありません</div>';
      return;
    }
    const label = state.course+" / "+(state.surface==="芝"?"芝":"ダート")+" / "+state.distance+" / "+state.baba;
    let html='<div class="result-wrap"><div class="result-header"><div class="result-title">'+label+'</div><div class="result-line"></div></div>';
    sires.forEach((sire,i)=>{
      const rc=i===0?"rank-1":i===1?"rank-2":i===2?"rank-3":"rank-n";
      html+='<div class="sire-card"><div class="sire-top"><div class="rank-badge '+rc+'">'+(sire.rank)+'</div><div class="sire-name">'+sire.種牡馬+'</div></div><div class="sire-stats"><div class="stat-item"><div class="stat-label">勝率</div><div class="stat-value hl">'+sire.勝率+'</div></div><div class="stat-item"><div class="stat-label">複勝率</div><div class="stat-value">'+sire.複勝率+'</div></div><div class="stat-item"><div class="stat-label">単勝回収率</div><div class="stat-value">'+sire.単勝回収率+'</div></div></div><div class="sire-runs">出走数: '+sire.出走数+'レース</div></div>';
    });
    html+='<p class="note">※ 直近データ重視・直近2年以内に出走実績がある種牡馬のみ表示<br>※ 本データは参考情報です。馬券購入は自己責任でお願いします。</p></div>';
    resultArea.innerHTML=html;
    resultArea.scrollIntoView({behavior:"smooth",block:"start"});
  } catch(e) {
    resultArea.innerHTML='<div class="no-data">表示エラー: '+e.message+'</div>';
  }
}

</script>
</body>
</html>
