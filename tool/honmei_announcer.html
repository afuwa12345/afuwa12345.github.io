<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>本命発表 — AFRO Horse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--red:#FF1A1A;--black:#080808;--white:#FFFFFF;--gold:#f5c518;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--black);color:var(--white);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden;min-height:100vh;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(8,8,8,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,26,26,0.15);}
.nav-logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;}
.nav-logo em{color:var(--red);font-style:normal;}
.nav-back{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-decoration:none;}

/* FORM PAGE */
.form-page{padding:70px 20px 40px;}
.hero{text-align:center;padding:16px 0 24px;position:relative;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,26,26,0.12) 0%,transparent 70%);pointer-events:none;}
.hero-eyebrow{font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:6px;color:var(--red);margin-bottom:4px;}
.hero-title{font-family:'Bebas Neue',cursive;font-size:56px;letter-spacing:4px;line-height:0.9;margin-bottom:6px;}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:1px;}

/* CHAR SELECTOR */
.section-label{font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.3);margin-bottom:10px;}
.char-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.char-pill{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:1px;padding:7px 13px;border-radius:30px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;}
.char-pill.selected{background:var(--red);color:#fff;border-color:var(--red);}
.char-pill:active{transform:scale(0.95);}

/* INPUTS */
.input-group{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;}
.input-wrap{display:flex;flex-direction:column;gap:5px;}
.input-label{font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.3);}
.input-field{background:#111;border:1px solid #252525;border-radius:10px;padding:14px 16px;color:var(--white);font-size:16px;font-family:'Noto Sans JP',sans-serif;font-weight:700;transition:border-color 0.2s;outline:none;width:100%;}
.input-field:focus{border-color:var(--red);}
.input-field::placeholder{color:rgba(255,255,255,0.18);font-weight:400;}
.row{display:flex;gap:12px;}
.row .input-wrap.sm{flex:0 0 88px;}
.row .input-wrap{flex:1;}
.num-field{text-align:center;font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:2px;padding:10px 8px;}

/* SUBMIT */
.submit-btn{width:100%;padding:18px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:4px;cursor:pointer;box-shadow:0 4px 24px rgba(255,26,26,0.35);transition:all 0.15s;}
.submit-btn:active{transform:scale(0.97);}

/* ========================
   STAGE (全画面発表)
======================== */
.stage{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;
  overflow:hidden;
  opacity:0;pointer-events:none;
  transition:opacity 0.35s;
}
.stage.show{opacity:1;pointer-events:all;}

/* 発表カード (キャプチャ対象) */
.announce-card{
  flex:1;position:relative;
  display:flex;flex-direction:column;
  overflow:hidden;
  background:var(--black);
}

/* 背景 */
.stage-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 90% 55% at 50% 100%, rgba(255,26,26,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,200,0,0.06) 0%, transparent 60%),
    #080808;
}
.stage-bg::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 6px);
  pointer-events:none;
}

/* スポットライト */
.spotlight{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:100%;height:100%;
  background:conic-gradient(from 180deg at 50% -10%,transparent 60deg,rgba(255,220,0,0.04) 90deg,transparent 120deg);
  pointer-events:none;
  animation:spotSpin 8s linear infinite;
}
@keyframes spotSpin{to{transform:translateX(-50%) rotate(360deg);}}

/* ブランドロゴ */
.stage-logo{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:4px;
  color:rgba(255,255,255,0.12);white-space:nowrap;z-index:2;pointer-events:none;
}

/* ========== 上ゾーン: ピック情報 ========== */
.pick-zone{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:44px 20px 4px;
  position:relative;z-index:2;
  transform:translateY(-14px);opacity:0;
  transition:all 0.5s 0.2s;
  min-height:0;
}
.stage.show .pick-zone{transform:none;opacity:1;}

/* レース名 */
.race-banner-inner{
  display:inline-flex;align-items:center;gap:10px;
  font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:5px;
  color:var(--gold);
  border:1px solid rgba(245,197,24,0.4);
  background:rgba(245,197,24,0.07);
  padding:5px 20px;border-radius:4px;
  margin-bottom:6px;
}
.race-banner-inner::before,.race-banner-inner::after{content:'◆';font-size:8px;opacity:0.5;}

/* 区切りライン */
.pick-divider{
  display:flex;align-items:center;gap:10px;
  width:100%;max-width:280px;margin:6px auto;
}
.pick-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,26,26,0.5));}
.pick-divider-line.r{background:linear-gradient(270deg,transparent,rgba(255,26,26,0.5));}
.pick-divider-dot{width:6px;height:6px;background:var(--red);border-radius:50%;box-shadow:0 0 8px rgba(255,26,26,0.8);}

/* 馬番 */
.pick-num-wrap{position:relative;display:inline-block;}
.pick-num-bg{
  position:absolute;inset:-10px;
  background:radial-gradient(ellipse,rgba(255,26,26,0.18) 0%,transparent 70%);
  filter:blur(10px);
}
.pick-num-big{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(70px,18vw,110px);
  line-height:1;letter-spacing:2px;
  color:var(--red);position:relative;
  text-shadow:
    0 0 40px rgba(255,26,26,0.9),
    0 0 80px rgba(255,26,26,0.5),
    4px 4px 0 rgba(120,0,0,0.6);
}
.pick-num-label{
  font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:5px;
  color:rgba(255,255,255,0.3);margin-top:-4px;margin-bottom:4px;text-align:center;
}
.pick-horse-name{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(32px,9vw,52px);
  letter-spacing:10px;line-height:1;
  position:relative;text-align:center;
  background:linear-gradient(180deg,#fff 0%,#f5c518 55%,#e0a800 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 12px rgba(245,197,24,0.7)) drop-shadow(0 0 30px rgba(245,197,24,0.35));
}
.pick-horse-name::before{
  content:'';display:block;height:1px;margin:0 auto 8px;width:40%;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.pick-horse-name::after{
  content:'';display:block;height:2px;margin:8px auto 0;width:60%;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* ========== 下ゾーン: キャラ + 吹き出し ========== */
.char-zone{
  flex:0 0 auto;
  position:relative;
  display:flex;align-items:flex-end;justify-content:center;
  height:min(55vw,240px);
}

/* 吹き出し — flex通常フロー */
.speech-bubble{
  position:relative;
  left:auto;bottom:auto;transform:scale(0.85);
  width:calc(100% - 40px);max-width:320px;
  margin:0 auto 0;
  background:#fff;border-radius:18px;
  padding:14px 16px 12px;
  box-shadow:0 8px 40px rgba(0,0,0,0.7);
  opacity:0;z-index:4;
  flex-shrink:0;
  transition:all 0.5s 0.7s cubic-bezier(0.34,1.56,0.64,1);
}
.stage.show .speech-bubble{transform:scale(1);opacity:1;}
.speech-bubble::after{
  content:'';position:absolute;
  bottom:-13px;left:50%;transform:translateX(-50%);
  border:7px solid transparent;border-top-color:#fff;border-bottom:none;
}
.bubble-name{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:var(--red);margin-bottom:3px;}
.bubble-text{font-size:13px;line-height:1.65;color:#111;font-weight:700;}

/* キャラ */
.char-wrap{
  width:min(55vw,240px);
  position:relative;z-index:3;
  transform:translateY(30px);opacity:0;
  transition:all 0.7s 0.5s cubic-bezier(0.34,1.56,0.64,1);
  flex-shrink:0;
}
.stage.show .char-wrap{transform:translateY(0);opacity:1;animation:charBob 2.2s ease-in-out 1.2s infinite;}
@keyframes charBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.char-wrap img{width:100%;filter:drop-shadow(0 12px 40px rgba(0,0,0,0.9));display:block;}

/* 紙吹雪 */
.confetti-wrap{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden;}
.conf{position:absolute;top:-10px;animation:confFall linear forwards;}
@keyframes confFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* アクションバー */
.action-bar{
  background:#080808;
  border-top:1px solid #1a1a1a;
  padding:14px 20px;
  display:flex;gap:10px;
  z-index:6;position:relative;
  transform:translateY(100%);
  transition:transform 0.4s 0.4s;
}
.stage.show .action-bar{transform:none;}
.action-btn{
  flex:1;padding:14px 8px;border:none;border-radius:10px;
  font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;
  cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.action-btn:active{transform:scale(0.96);}
.btn-save{background:var(--white);color:var(--black);}
.btn-share{background:var(--red);color:var(--white);}
.btn-x{background:#111;color:var(--white);border:1px solid #222;}
.btn-close{background:#111;color:rgba(255,255,255,0.5);border:1px solid #1a1a1a;flex:0 0 48px;padding:14px 0;font-size:20px;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">AFRO<em>Horse</em></div>
  <a class="nav-back" href="index.html">← HOME</a>
</nav>

<div class="form-page">
  <div class="hero">
    <p class="hero-eyebrow">Pick Announcer</p>
    <h1 class="hero-title">本命<br>発表</h1>
    <p class="hero-sub">アフロホースが本命を発表する</p>
  </div>

  <p class="section-label">発表キャラ</p>
  <div class="char-pills">
    <button class="char-pill selected" data-char="random" onclick="selectChar(this)">🎲 ランダム</button>
    <button class="char-pill" data-char="afu"  onclick="selectChar(this)">アフワ</button>
    <button class="char-pill" data-char="yan"  onclick="selectChar(this)">やんちゃアフワ</button>
    <button class="char-pill" data-char="blue" onclick="selectChar(this)">ブルマ</button>
    <button class="char-pill" data-char="cha"  onclick="selectChar(this)">チャフワ</button>
    <button class="char-pill" data-char="kuro" onclick="selectChar(this)">クロフワ</button>
    <button class="char-pill" data-char="gin"  onclick="selectChar(this)">ギンマ</button>
  </div>

  <div class="input-group">
    <div class="input-wrap">
      <label class="input-label">レース名</label>
      <input class="input-field" id="raceName" type="text" placeholder="例）日本ダービー" maxlength="20"/>
    </div>
    <div class="row">
      <div class="input-wrap sm">
        <label class="input-label">馬番</label>
        <input class="input-field num-field" id="horseNum" type="number" placeholder="1" min="1" max="18"/>
      </div>
      <div class="input-wrap">
        <label class="input-label">馬名</label>
        <input class="input-field" id="horseName" type="text" placeholder="例）アフロキング" maxlength="12"/>
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="announce()">🏇 発表する</button>
</div>

<!-- STAGE -->
<div class="stage" id="stage">
  <div class="announce-card" id="announceCard">
    <div class="stage-bg"></div>
    <div class="spotlight"></div>
    <div class="confetti-wrap" id="confetti"></div>
    <div class="stage-logo">AFRO Horse</div>

    <!-- 上ゾーン: レース名 + 馬番 + 馬名 -->
    <div class="pick-zone">
      <span class="race-banner-inner" id="stageRace">日本ダービー</span>
      <div class="pick-divider">
        <div class="pick-divider-line"></div>
        <div class="pick-divider-dot"></div>
        <div class="pick-divider-line r"></div>
      </div>
      <div class="pick-num-wrap">
        <div class="pick-num-bg"></div>
        <div class="pick-num-big" id="stageNum">1</div>
      </div>
      <div class="pick-num-label">番</div>
      <div class="pick-horse-name" id="stageName">アフロキング</div>
      <div class="pick-divider">
        <div class="pick-divider-line"></div>
        <div class="pick-divider-dot"></div>
        <div class="pick-divider-line r"></div>
      </div>
    </div>

    <!-- 吹き出し (pick-zoneとchar-zoneの間) -->
    <div class="speech-bubble" id="bubble">
      <div class="bubble-name" id="bubbleName">アフワ</div>
      <div class="bubble-text" id="bubbleText">本命は…！</div>
    </div>

    <!-- 下ゾーン: キャラ -->
    <div class="char-zone">
      <div class="char-wrap">
        <img id="charImg" src="" alt="character"/>
      </div>
    </div>
  </div>
  <!-- アクションバー -->
  <div class="action-bar">
    <button class="action-btn btn-save" onclick="saveImage()">💾 保存</button>
    <button class="action-btn btn-share" onclick="shareNative()">📤 シェア</button>
    <button class="action-btn btn-x" onclick="shareX()">𝕏 ポスト</button>
    <button class="action-btn btn-close" onclick="closeStage()">✕</button>
  </div>
</div>

let selectedChar = 'random';
let currentShareText = '';

function selectChar(btn){
  document.querySelectorAll('.char-pill').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedChar = btn.dataset.char;
}

function announce(){
  const race  = document.getElementById('raceName').value.trim() || '本日のレース';
  const num   = document.getElementById('horseNum').value.trim() || '?';
  const horse = document.getElementById('horseName').value.trim() || '本命馬';
  const keys  = Object.keys(CHARS);
  const key   = selectedChar==='random' ? keys[Math.floor(Math.random()*keys.length)] : selectedChar;
  const c     = CHARS[key];
  const line  = c.lines[Math.floor(Math.random()*c.lines.length)];

  document.getElementById('stageRace').textContent = race;
  document.getElementById('stageNum').textContent  = num;
  document.getElementById('stageName').textContent = horse;
  document.getElementById('bubbleName').textContent= c.name;
  document.getElementById('bubbleText').textContent= line;
  document.getElementById('charImg').src = 'data:image/png;base64,' + c.img;

  currentShareText = `🐴 AFRO Horse 本命発表！\n【${race}】\n${num}番 ${horse}\n\n「${line}」\n\n#AFROHorse #競馬 #本命`;

  document.getElementById('stage').classList.add('show');
  document.body.style.overflow='hidden';
  fireConfetti();
}

function closeStage(){
  document.getElementById('stage').classList.remove('show');
  document.body.style.overflow='';
  document.getElementById('confetti').innerHTML='';
}

/* グラデーションテキストをソリッドカラーに一時切替 */
function fixGradientForCapture(){
  const el = document.getElementById('stageName');
  el.dataset.origStyle = el.getAttribute('style') || '';
  el.style.cssText += ';background:none;-webkit-background-clip:unset;background-clip:unset;-webkit-text-fill-color:#f5c518;color:#f5c518;filter:none;';
  return el;
}
function restoreGradient(el){
  el.style.cssText = el.dataset.origStyle;
}

/* キャプチャ共通 */
async function captureCard(){
  const card = document.getElementById('announceCard');
  const nameEl = fixGradientForCapture();
  await new Promise(r => requestAnimationFrame(r)); // 描画反映待ち
  const canvas = await html2canvas(card,{
    backgroundColor:'#080808',
    scale:2,
    useCORS:true,
    allowTaint:true,
    ignoreElements: el => el.classList.contains('confetti-wrap')
  });
  restoreGradient(nameEl);
  return canvas;
}

/* 画像保存 */
async function saveImage(){
  const now = new Date();
  const ts = now.getFullYear().toString().slice(2)
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0')
    + '_'
    + String(now.getHours()).padStart(2,'0')
    + String(now.getMinutes()).padStart(2,'0');
  const defaultName = 'afrohorse_honmei_' + ts;
  const input = prompt('保存ファイル名を入力（拡張子不要）', defaultName);
  if(input === null) return;
  const filename = (input.trim() || defaultName) + '.png';
  const canvas = await captureCard();
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

/* ネイティブシェア (モバイル) */
async function shareNative(){
  const canvas = await captureCard();
  canvas.toBlob(async blob=>{
    const file = new File([blob],'afrohorse_honmei.png',{type:'image/png'});
    if(navigator.share && navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'AFRO Horse 本命発表',text:currentShareText});
    } else {
      window.open(URL.createObjectURL(blob),'_blank');
    }
  },'image/png');
}

/* X (Twitter) ポスト */
function shareX(){
  const text = encodeURIComponent(currentShareText);
  window.open(`https://twitter.com/intent/tweet?text=${text}`,'_blank');
}

/* 紙吹雪 */
function fireConfetti(){
  const wrap = document.getElementById('confetti');
  wrap.innerHTML='';
  const colors=['#FF1A1A','#FFD700','#44DDFF','#FF8844','#AAAAFF','#ffffff','#FF69B4'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');
    el.className='conf';
    const size=4+Math.random()*10;
    el.style.cssText=`
      left:${Math.random()*100}%;
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${1.8+Math.random()*2.5}s;
      animation-delay:${Math.random()*0.8}s;
    `;
    wrap.appendChild(el);
  }
}
