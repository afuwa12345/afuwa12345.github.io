<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AFRO HORSE｜今週の予想</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
:root{--red:#e8281e;--red-glow:rgba(232,40,30,0.4);--bg:#0e0b0b;--surface:#1c1010;--surface2:#231414;--text:#f0e8e8;--muted:#7a5a5a;--border:rgba(232,40,30,0.25)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Kosugi Maru',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.6}
header{position:sticky;top:0;z-index:100;background:rgba(14,11,11,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px}.logo span{color:var(--red)}
.header-badge{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--red);border:1px solid var(--red);padding:3px 8px;border-radius:2px}
.hero{position:relative;padding:48px 20px 36px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:340px;height:340px;background:radial-gradient(circle,var(--red-glow) 0%,transparent 70%);pointer-events:none}
.hero-week{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--red);text-transform:uppercase;margin-bottom:12px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,16vw,72px);line-height:0.9;letter-spacing:4px;margin-bottom:6px}
.hero-title .line2{color:var(--red)}
.hero-sub{font-size:11px;letter-spacing:4px;color:var(--muted);margin-top:14px}
.divider{display:flex;align-items:center;gap:12px;margin:20px auto;max-width:220px;color:var(--red);font-size:10px;letter-spacing:3px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--red);opacity:0.5}
main{position:relative;z-index:1;padding:0 14px 60px;max-width:680px;margin:0 auto}
.last-updated{text-align:right;font-size:10px;color:var(--muted);margin-bottom:16px;letter-spacing:1px}
.race-group{margin-bottom:28px;animation:fadeUp 0.4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.race-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.race-date{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:2px}
.race-venue{font-size:10px;font-weight:700;letter-spacing:2px;color:#fff;background:var(--red);padding:3px 8px;border-radius:2px}
.race-r{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--red);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:2px}
.race-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;line-height:1}
.race-line{flex:1;min-width:20px;height:1px;background:var(--border)}
.bet-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.15s}
.bet-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.bet-card:hover{border-color:var(--red);transform:translateX(2px)}
.bet-top{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:12px}
.horse-num{width:44px;height:44px;border-radius:50%;background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 12px var(--red-glow)}
.horse-name{font-weight:900;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shiki-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;background:rgba(232,40,30,0.15);border:1px solid rgba(232,40,30,0.4);color:var(--red);padding:2px 7px;border-radius:2px;margin-top:4px}
.kaime{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:#fff;text-align:right;line-height:1}
.kaime small{display:block;font-family:'Kosugi Maru',sans-serif;font-size:9px;font-weight:400;color:var(--muted);letter-spacing:1px}

/* ── キャラクター吹き出し ── */
.chara-wrap{display:flex;align-items:flex-end;gap:12px;margin-top:12px;animation:charaPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes charaPop{from{opacity:0;transform:scale(0.7) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.chara-img{width:80px;height:auto;flex-shrink:0;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5))}
.speech-bubble{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:12px 12px 12px 0;padding:10px 14px;font-size:12px;color:var(--text);line-height:1.6;flex:1;}
.speech-bubble::before{content:'';position:absolute;bottom:0;left:-8px;width:0;height:0;border-style:solid;border-width:0 0 10px 8px;border-color:transparent transparent var(--border) transparent}
.speech-bubble::after{content:'';position:absolute;bottom:1px;left:-6px;width:0;height:0;border-style:solid;border-width:0 0 9px 7px;border-color:transparent transparent var(--surface2) transparent}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .big{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--border)}
footer{text-align:center;padding:30px 20px;font-size:10px;color:var(--muted);letter-spacing:2px;border-top:1px solid var(--border)}
footer span{color:var(--red)}

/* ── モバイル最適化 ── */
@media (max-width: 600px) {
  header{padding:0 14px}
  .logo{font-size:20px}
  .hero{padding:32px 16px 24px}
  .hero-title{font-size:clamp(52px,18vw,72px)}
  main{padding:0 10px 60px}
  .bet-top{grid-template-columns:38px 1fr auto;gap:8px}
  .horse-num{width:38px;height:38px;font-size:18px}
  .horse-name{font-size:14px}
  .kaime{font-size:26px}
  .race-name{font-size:17px}
  .chara-img{width:64px}
  .speech-bubble{font-size:11px;padding:8px 10px}
  .bet-card{padding:12px 12px}
}

/* ── ハンコ ── */
.stamp-wrap{position:relative}
.stamp{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-15deg) scale(0);
  width:90px;height:90px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Kosugi Maru',sans-serif;
  font-size:18px;font-weight:900;
  letter-spacing:2px;
  border:4px solid;
  opacity:0;
  transition:none;
  pointer-events:none;
  z-index:10;
  line-height:1.2;
  text-align:center;
}
.stamp.atari{
  color:rgba(220,30,20,0.85);
  border-color:rgba(220,30,20,0.85);
  box-shadow:inset 0 0 0 2px rgba(220,30,20,0.2);
}
.stamp.hazure{
  color:rgba(120,120,120,0.75);
  border-color:rgba(120,120,120,0.75);
  box-shadow:inset 0 0 0 2px rgba(120,120,120,0.15);
}
.stamp.show{
  animation:stampIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes stampIn{
  0%{transform:translate(-50%,-50%) rotate(-15deg) scale(1.4);opacity:0}
  60%{opacity:1}
  100%{transform:translate(-50%,-50%) rotate(-15deg) scale(1);opacity:1}
}
</style>
</head>

function randChar() {
  return CHARS[Math.floor(Math.random() * CHARS.length)];
}

// ── サンプルデータ（GAS組み込み時はここを差し替え）──
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyZmRH7ih6t9ZRITXERp_FwlcHNjnun-WVbb2mAMm29DR61w11hdElMADOXwYMWrdBJ/exec';

async function loadData() {
  try {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">読み込み中...</div>';
    const res = await fetch(GAS_URL);
    const rows = await res.json();
    renderPredictions(rows);
    document.getElementById('lastUpdated').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
  } catch(e) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">データの読み込みに失敗しました</div>';
    console.error(e);
  }
}

function updateWeekLabel(){
  const now=new Date(),y=now.getFullYear(),day=now.getDay();
  const sun=new Date(now);sun.setDate(now.getDate()-day);
  const sat=new Date(sun);sat.setDate(sun.getDate()+6);
  const fmt=d=>d.getMonth()+1+'/'+d.getDate();
  document.getElementById('weekLabel').textContent=y+' '+fmt(sun)+' - '+fmt(sat)+' PREDICTION';
}

function formatDate(v){
  if(!v) return '';
  const d=new Date(v);
  if(isNaN(d)) return String(v);
  return (d.getMonth()+1)+'/'+d.getDate()+'('+['日','月','火','水','木','金','土'][d.getDay()]+')';
}

function renderPredictions(rows){
  const content=document.getElementById('content');
  if(!rows.length){
    content.innerHTML='<div class="empty-state"><div class="big">NO DATA</div><div>データがありません</div></div>';
    return;
  }
  const groups={}, order=[];
  rows.forEach(row=>{
    const key=(row['日付']||'')+'_'+(row['競馬場']||'')+'_'+(row['R']||'');
    if(!groups[key]){groups[key]=[];order.push(key);}
    groups[key].push(row);
  });
  let html='';
  order.forEach((key,gi)=>{
    const bets=groups[key];
    const r0=bets[0];
    const dateStr=formatDate(r0['日付']);
    const venue=r0['競馬場']||'';
    const rNum=r0['R']?r0['R']+'R':'';
    const raceName=r0['レース名']||'';
    html+='<div class="race-group" style="animation-delay:'+gi*0.07+'s">';
    html+='<div class="race-header">';
    if(dateStr) html+='<div class="race-date">'+dateStr+'</div>';
    if(venue)   html+='<div class="race-venue">'+venue+'</div>';
    if(rNum)    html+='<div class="race-r">'+rNum+'</div>';
    if(raceName)html+='<div class="race-name">'+raceName+'</div>';
    html+='<div class="race-line"></div></div>';
    bets.forEach(row=>{
      const uma   = row['本命馬名']||'---';
      const num   = row['馬番']||'?';
      const shiki = row['式別']||'';
      const kaime = row['買い目']||'-';
      const comment = row['コメント']||'';
      const charIdx = Math.floor(Math.random()*CHARS.length);
      const result = row['結果']||'';
      const stampClass = result==='〇'?'atari':result==='✕'?'hazure':'';
      const stampText = result==='〇'?'的中':result==='✕'?'ハズレ':'';
      const shiki2 = row['式別2']||'';
      const kaime2 = row['買い目2']||'';
      html+='<div class="bet-card stamp-wrap"><div class="bet-top">';
      html+='<div class="horse-num">'+num+'</div>';
      html+='<div><div class="horse-name">'+uma+'</div></div>';
      html+='<div style="text-align:right;flex-shrink:0">';
      html+='<div style="display:flex;align-items:center;justify-content:flex-end;gap:6px">'+(shiki?'<span class="shiki-badge">'+shiki+'</span>':'')+'<div class="kaime">'+kaime+'</div></div>';
      if(kaime2) html+='<div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:4px;border-top:1px solid var(--border);padding-top:4px">'+(shiki2?'<span class="shiki-badge">'+shiki2+'</span>':'')+'<div class="kaime">'+kaime2+'</div></div>';
      html+='</div>';
      html+='</div>';
      if(stampClass) html+='<div class="stamp '+stampClass+' show">'+stampText+'</div>';
      const charaComment = getComment(charIdx);
      html+='<div class="chara-wrap" style="animation-delay:'+(gi*0.07+0.15)+'s">';
      html+='<img class="chara-img" src="'+CHARS[charIdx]+'" alt="character">';
      html+='<div class="speech-bubble">'+charaComment+'</div>';
      html+='</div>';
      html+='</div>';
    });
    html+='</div>';
  });
  content.innerHTML=html;
}

updateWeekLabel();
loadData();
</script>
